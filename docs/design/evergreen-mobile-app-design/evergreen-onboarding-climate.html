
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Onboarding — Climate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--sun:#f5c451;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}

  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .screen *{position:relative}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:40;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:40;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.32)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:40;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:40;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.28)}

  .statusbar{position:absolute;z-index:30;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:20px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg)}
  .pixel .statusbar{padding-top:16px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}

  .app{position:absolute;inset:0;z-index:10;padding:60px 22px 26px;display:flex;flex-direction:column}
  .pixel .app{padding-top:54px}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
  .iconbtn{flex:none;width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-700);transition:box-shadow .14s}
  .iconbtn:active{box-shadow:var(--neu-pressed)}
  .progress{flex:1;display:flex;gap:5px;align-items:center}
  .progress .seg{flex:1;height:5px;border-radius:3px;background:var(--ever-100);box-shadow:var(--neu-pressed);overflow:hidden}
  .progress .seg .fill{display:block;height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,var(--ever-500),var(--ever-400));transform:scaleX(0);transform-origin:left center}
  .stepno{flex:none;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted)}

  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ever-500);margin-bottom:7px}
  .head h1{font-family:var(--font-display);font-weight:600;font-size:25px;line-height:1.12;letter-spacing:-.02em;color:var(--ever-900)}
  .head p{margin-top:7px;font-size:13px;line-height:1.5;color:var(--fg-muted)}

  .body{margin-top:20px;display:flex;flex-direction:column;gap:13px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;height:52px;border:0;cursor:pointer;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-raised);font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--ever-700);transition:box-shadow .14s,transform .14s,opacity .2s;-webkit-tap-highlight-color:transparent}
  .btn:hover{transform:translateY(-1px)}.btn:active{box-shadow:var(--neu-pressed);transform:translateY(0)}
  .btn .lic{display:flex;color:var(--ever-500)}
  .btn .arr{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-tint);color:var(--ever-500)}
  .btn[disabled]{opacity:.5;cursor:not-allowed;box-shadow:var(--neu-raised-sm)}.btn[disabled]:hover{transform:none}
  .btn.busy{color:var(--fg-muted)}
  .btn.done{color:var(--leaf)}

  .divider{display:flex;align-items:center;gap:12px;color:var(--fg-subtle);font-family:var(--font-mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(22,39,30,.16),transparent)}

  .citywrap{position:relative}
  .field{display:flex;align-items:center;gap:10px;height:52px;padding:0 16px;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .field .ic{display:flex;color:var(--ever-500);flex:none}
  .field input{flex:1;border:0;outline:0;background:transparent;font-family:var(--font-body);font-size:15px;color:var(--ever-900);min-width:0}
  .field input::placeholder{color:var(--fg-subtle)}
  .suggest{position:absolute;top:58px;left:0;right:0;z-index:20;border-radius:14px;background:var(--ever-100);box-shadow:var(--neu-raised);padding:6px;display:none}
  .suggest.open{display:block}
  .suggest button{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border:0;background:transparent;border-radius:10px;cursor:pointer;font-family:var(--font-body);font-size:14px;color:var(--fg);text-align:left}
  .suggest button:hover{background:var(--accent-tint)}
  .suggest .zone{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
  .suggest .empty{padding:12px;font-size:13px;color:var(--fg-subtle);text-align:center}

  /* climate preview card */
  .climate{display:none;align-items:center;gap:14px;padding:14px 16px;border-radius:18px;background:var(--ever-100);box-shadow:var(--neu-raised)}
  .climate.show{display:flex}
  .glyph{flex:none;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .glyph svg{display:block;overflow:visible}
  .climate .meta{flex:1;min-width:0}
  .climate .city{font-family:var(--font-display);font-weight:600;font-size:16px;color:var(--ever-900);letter-spacing:-.01em}
  .climate .zone{font-size:12px;color:var(--fg-muted);margin-top:1px}
  .climate .stats{margin-top:6px;display:flex;gap:12px;font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);font-variant-numeric:tabular-nums}
  .climate .stats b{color:var(--ever-700);font-weight:600}
  .climate .temp{flex:none;font-family:var(--font-mono);font-weight:600;font-size:30px;color:var(--ever-700);font-variant-numeric:tabular-nums;letter-spacing:-.02em}

  .foot{margin-top:auto;display:flex;flex-direction:column;gap:9px}
  .subnote{text-align:center;font-size:11.5px;color:var(--fg-subtle)}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}

  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{transform-origin:50% 50%;animation:spin .8s linear infinite}
  @keyframes rainfall{0%{transform:translateY(-3px);opacity:0}30%{opacity:1}100%{transform:translateY(7px);opacity:0}}
  .rain line{animation:rainfall 1.1s linear infinite}
  .rain line:nth-child(2){animation-delay:.36s}.rain line:nth-child(3){animation-delay:.72s}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>

  <header class="studio-head">
    <span class="kicker">Evergreen · 04 Onboarding</span>
    <h1>Per-Location setup — step 2 of 6 · Climate</h1>
  </header>

  <div class="gallery">
    <div class="device">
      <div class="phone iphone">
        <div class="island"></div>
        <div class="screen" data-screen-label="04 Onboarding · Climate" data-od-id="onb-climate-ios">
          <div class="statusbar"><span>9:41</span><span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
          </span></div>
          <div class="app"></div>
          <div class="home-ind"></div>
        </div>
      </div>
      <span class="device-cap">iPhone 15 Pro</span>
    </div>

    <div class="device">
      <div class="phone pixel">
        <div class="punch"></div>
        <div class="screen" data-screen-label="04 Onboarding · Climate" data-od-id="onb-climate-android">
          <div class="statusbar"><span>9:41</span><span class="icons">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg>
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
            <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg>
          </span></div>
          <div class="app"></div>
          <div class="nav-pill"></div>
        </div>
      </div>
      <span class="device-cap">Pixel 8 Pro</span>
    </div>
  </div>

  <button class="replay" id="replay" aria-label="Replay entrance">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
    Replay entrance
  </button>

<script>
(function(){
  const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const I={
    back:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
    pin:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 5-8 12-8 12s-8-7-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
    search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>',
    arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>',
    check:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
    spin:'<svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-opacity=".22" stroke-width="2.4"/><path d="M12 3.5a8.5 8.5 0 0 1 8.5 8.5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>'
  };
  // weather glyphs
  function sunGlyph(){return `<svg width="34" height="34" viewBox="0 0 40 40"><g class="rays" stroke="${'#f5c451'}" stroke-width="2.4" stroke-linecap="round">`+
    Array.from({length:8},(_,i)=>{const a=i*45*Math.PI/180,x=20+Math.cos(a)*15.5,y=20+Math.sin(a)*15.5,x2=20+Math.cos(a)*18.5,y2=20+Math.sin(a)*18.5;return `<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;}).join('')+
    `</g><circle cx="20" cy="20" r="9" fill="#f5c451"/></svg>`;}
  function cloudGlyph(rain){return `<svg width="36" height="34" viewBox="0 0 44 40"><path d="M14 27a7 7 0 0 1 .6-13.9 9 9 0 0 1 17.3 2.2A6.4 6.4 0 0 1 31 27Z" fill="none" stroke="#4b6357" stroke-width="2.2" stroke-linejoin="round"/>`+
    (rain?`<g class="rain" stroke="#4daf82" stroke-width="2.2" stroke-linecap="round"><line x1="17" y1="30" x2="17" y2="34"/><line x1="23" y1="30" x2="23" y2="34"/><line x1="29" y1="30" x2="29" y2="34"/></g>`:'')+`</svg>`;}

  const CITIES=[
    {city:'Lisbon, Portugal',zone:'Mediterranean · mild winters',temp:19,hum:64,wind:'SW 12',glyph:'sun'},
    {city:'London, United Kingdom',zone:'Temperate maritime',temp:12,hum:78,wind:'W 18',glyph:'cloud'},
    {city:'Berlin, Germany',zone:'Continental',temp:9,hum:71,wind:'NE 14',glyph:'cloud'},
    {city:'Singapore',zone:'Tropical rainforest',temp:30,hum:84,wind:'calm',glyph:'rain'},
    {city:'Phoenix, USA',zone:'Hot desert · arid',temp:28,hum:22,wind:'S 9',glyph:'sun'},
    {city:'San Francisco, USA',zone:'Mediterranean · coastal fog',temp:16,hum:74,wind:'W 20',glyph:'cloud'},
    {city:'Amsterdam, Netherlands',zone:'Temperate maritime',temp:11,hum:80,wind:'SW 22',glyph:'rain'}
  ];

  function appHTML(){
    const segs=Array.from({length:6},(_,i)=>`<span class="seg${i<2?' done':''}"><span class="fill"></span></span>`).join('');
    return `
    <div class="topbar">
      <button class="iconbtn back" aria-label="Back">${I.back}</button>
      <div class="progress" aria-label="Step 2 of 6">${segs}</div>
      <span class="stepno">2/6</span>
    </div>
    <div class="head">
      <div class="eyebrow">Step 2 · Climate</div>
      <h1>Where do you garden?</h1>
      <p>Your city sets the climate we plan care around — light hours, humidity, and season.</p>
    </div>
    <div class="body">
      <button type="button" class="btn useloc"><span class="lic">${I.pin}</span> Use my location</button>
      <div class="divider">or enter a city</div>
      <div class="citywrap">
        <label class="field"><span class="ic">${I.search}</span>
          <input type="text" autocomplete="off" placeholder="Search your city" aria-label="City"></label>
        <div class="suggest"></div>
      </div>
      <div class="climate">
        <div class="glyph"></div>
        <div class="meta"><div class="city"></div><div class="zone"></div>
          <div class="stats"><span>humidity <b class="h"></b></span><span>wind <b class="w"></b></span></div>
        </div>
        <div class="temp"></div>
      </div>
    </div>
    <div class="foot">
      <button type="button" class="btn cont" disabled>Continue <span class="arr">${I.arrow}</span></button>
      <p class="subnote">We refresh the local forecast each morning.</p>
    </div>`;
  }

  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());

  function setup(root){
    const useloc=root.querySelector('.useloc'),input=root.querySelector('.field input'),
          suggest=root.querySelector('.suggest'),climate=root.querySelector('.climate'),
          cont=root.querySelector('.cont'),note=root.querySelector('.subnote');
    let chosen=null;

    function renderGlyph(c){const g=root.querySelector('.glyph');g.innerHTML=c.glyph==='sun'?sunGlyph():cloudGlyph(c.glyph==='rain');
      const rays=g.querySelector('.rays');if(rays&&!REDUCE)gsap.to(rays,{rotation:360,duration:14,svgOrigin:'20 20',repeat:-1,ease:'none'});}
    function select(c){
      chosen=c;input.value=c.city;suggest.classList.remove('open');
      climate.querySelector('.city').textContent=c.city;climate.querySelector('.zone').textContent=c.zone;
      climate.querySelector('.temp').textContent=c.temp+'°';climate.querySelector('.h').textContent=c.hum+'%';
      climate.querySelector('.w').textContent=c.wind+(c.wind==='calm'?'':' km/h');
      renderGlyph(c);
      climate.classList.add('show');cont.disabled=false;
      if(!REDUCE)gsap.fromTo(climate,{y:10,opacity:0},{y:0,opacity:1,duration:.4,ease:'power3.out'});
    }
    function list(q){
      const ql=q.trim().toLowerCase();
      const matches=ql?CITIES.filter(c=>c.city.toLowerCase().includes(ql)):CITIES.slice(0,4);
      suggest.innerHTML=matches.length?matches.map((c,i)=>`<button type="button" data-i="${CITIES.indexOf(c)}">${c.city}<span class="zone">${c.temp}°</span></button>`).join('')
        :'<div class="empty">No match — type a nearby city</div>';
      suggest.classList.add('open');
      suggest.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>select(CITIES[+b.dataset.i])));
    }
    input.addEventListener('focus',()=>{if(!chosen)list(input.value)});
    input.addEventListener('input',()=>{chosen=null;climate.classList.remove('show');cont.disabled=true;list(input.value)});
    document.addEventListener('click',e=>{if(!root.querySelector('.citywrap').contains(e.target))suggest.classList.remove('open')});

    useloc.addEventListener('click',()=>{
      if(useloc.classList.contains('busy'))return;
      useloc.classList.add('busy');useloc.innerHTML='<span class="lic">'+I.spin+'</span> Detecting your location…';
      setTimeout(()=>{useloc.classList.remove('busy');useloc.innerHTML='<span class="lic">'+I.pin+'</span> Use my location';select(CITIES[0]);note.textContent='Detected from your device · you can change it anytime';},1100);
    });
    cont.addEventListener('click',()=>{if(cont.disabled)return;cont.classList.add('done');cont.innerHTML='Saved '+I.check;
      note.textContent='Next: your gardening level';
      setTimeout(()=>{cont.classList.remove('done');cont.innerHTML='Continue <span class="arr">'+I.arrow+'</span>';note.textContent='We refresh the local forecast each morning.';},2200);});
    root.querySelector('.back').addEventListener('click',()=>{});
  }

  function animateIn(root){
    const segFills=root.querySelectorAll('.progress .seg.done .fill');
    const seq=[root.querySelector('.head .eyebrow'),root.querySelector('.head h1'),root.querySelector('.head p'),
      root.querySelector('.useloc'),root.querySelector('.divider'),root.querySelector('.citywrap'),root.querySelector('.foot')];
    if(REDUCE){gsap.set(seq,{opacity:1,y:0});gsap.set(segFills,{scaleX:1});return;}
    gsap.set(seq,{opacity:0,y:16});gsap.set(segFills,{scaleX:0});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .fromTo(root.querySelector('.topbar'),{opacity:0,y:-8},{opacity:1,y:0,duration:.5})
      .to(segFills,{scaleX:1,duration:.6,ease:'power2.out'},'-=0.2')
      .to(seq,{opacity:1,y:0,duration:.58,stagger:.06},'-=0.25');
  }

  roots.forEach(setup);
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.foot')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
