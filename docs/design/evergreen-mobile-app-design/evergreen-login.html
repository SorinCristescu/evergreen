
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  /* ===== Evergreen tokens (active design system) ===== */
  :root{
    --ever-100:#d8e9df;     /* canonical light surface */
    --ever-400:#4daf82;
    --ever-500:#2c694e;
    --ever-700:#1b4332;
    --ever-900:#0c1f17;
    --leaf:#3e7c4f;
    --fg:#16271e;
    --fg-muted:#4b6357;
    --fg-subtle:#7d9488;
    --accent-tint:rgba(46,109,78,.12);
    /* neumorphism — light source top-left, on Evergreen-100 */
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;
    --hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body);color:var(--fg);
    background:
      radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),
      radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden;
  }

  /* studio header */
  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  /* gallery */
  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  /* phone shell */
  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);
    box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55);}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .screen *{position:relative}

  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}
  .iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:40;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c;box-shadow:0 0 0 1px rgba(0,0,0,.2)}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:40;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.32)}

  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}
  .pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:40;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:40;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.28)}

  /* status bar (dark on light) */
  .statusbar{position:absolute;z-index:30;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:20px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg)}
  .pixel .statusbar{padding-top:16px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}
  .statusbar svg{display:block}

  /* ===== login layout ===== */
  .app{position:absolute;inset:0;z-index:10;padding:62px 22px 26px;display:flex;flex-direction:column}
  .pixel .app{padding-top:56px}

  .brand{display:flex;flex-direction:column;align-items:center;gap:9px;margin-bottom:14px}
  .mark-sm{width:52px;height:52px;will-change:transform}
  .mark{width:100%;height:100%;display:block;overflow:visible}
  .wm{font-family:var(--font-display);font-weight:600;font-size:21px;letter-spacing:-.03em;text-transform:lowercase}
  .wm .ever{color:var(--ever-900)} .wm .green{color:var(--ever-500)}

  .welcome{text-align:center;margin-bottom:20px}
  .welcome h1{font-family:var(--font-display);font-weight:600;font-size:25px;letter-spacing:-.02em;color:var(--ever-900);line-height:1.15}
  .welcome p{margin-top:6px;font-size:14px;color:var(--fg-muted)}

  .auth{display:flex;flex-direction:column;gap:13px}
  .field{display:flex;align-items:center;gap:10px;height:50px;padding:0 16px;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .field .ic{display:flex;color:var(--ever-500);flex:none}
  .field input{flex:1;border:0;outline:0;background:transparent;font-family:var(--font-body);font-size:15px;color:var(--fg);min-width:0}
  .field input::placeholder{color:var(--fg-subtle)}
  .field.invalid{box-shadow:var(--neu-pressed),0 0 0 1.5px rgba(179,64,47,.4)}

  .btn{display:flex;align-items:center;justify-content:center;gap:10px;height:50px;border:0;cursor:pointer;
    border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-raised);
    font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--ever-900);
    -webkit-tap-highlight-color:transparent;transition:box-shadow .14s ease, transform .14s ease, opacity .2s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn:active{box-shadow:var(--neu-pressed);transform:translateY(0)}
  .btn svg{flex:none}
  .btn.primary{color:var(--ever-700)}
  .btn.primary .arr{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-tint);color:var(--ever-500)}
  .btn.primary[disabled]{opacity:.5;cursor:not-allowed;box-shadow:var(--neu-raised-sm)}
  .btn.primary[disabled]:hover{transform:none}
  .btn.oauth{color:var(--fg)}
  .btn.oauth .gmark{font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--ever-700)}

  .divider{display:flex;align-items:center;gap:12px;color:var(--fg-subtle);font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;margin:2px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(22,39,30,.16),transparent)}

  .hint{min-height:16px;font-size:12.5px;color:var(--leaf);text-align:center;font-weight:500}
  .hint.err{color:#b3402f}

  .legal{margin-top:auto;margin-bottom:auto;text-align:center;font-size:11.5px;color:var(--fg-subtle);line-height:1.5}
  .legal a{color:var(--fg-muted);text-decoration:underline;text-underline-offset:2px}

  /* sent / confirmation state */
  .sent{position:absolute;inset:62px 22px 26px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding-top:22px}
  .sent[hidden]{display:none}
  .sent-ic{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised);color:var(--ever-500);margin-bottom:8px}
  .sent h2{font-family:var(--font-display);font-weight:600;font-size:23px;color:var(--ever-900);letter-spacing:-.02em}
  .sent p{font-size:14px;color:var(--fg-muted);line-height:1.5;max-width:230px}
  .sent .to{color:var(--ever-700);font-weight:600}
  .sent .acts{margin-top:14px;width:100%;display:flex;flex-direction:column;gap:11px}
  .btn.ghost{box-shadow:none;background:transparent;height:42px;font-weight:500;font-size:14px;color:var(--fg-muted)}
  .btn.ghost:hover{transform:none;color:var(--ever-700)}
  .btn.ghost:active{box-shadow:none}
  .btn.ghost.resend[data-wait]{opacity:.5;pointer-events:none}

  /* studio replay (neumorphic, product material) */
  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;
    min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;
    font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);
    background:var(--ever-100);box-shadow:var(--neu-raised);border:0;
    transition:transform .16s ease, box-shadow .16s ease;-webkit-tap-highlight-color:transparent}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}
  .replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>

  <header class="studio-head">
    <span class="kicker">Evergreen · 02 Login</span>
    <h1>Sign-in first — Google · Apple · magic link</h1>
  </header>

  <div class="gallery">
    <div class="device">
      <div class="phone iphone">
        <div class="island"></div>
        <div class="screen" data-screen-label="02 Login" data-od-id="login-ios">
          <div class="statusbar">
            <span>9:41</span>
            <span class="icons">
              <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
            </span>
          </div>
          <div class="app"></div>
          <div class="home-ind"></div>
        </div>
      </div>
      <span class="device-cap">iPhone 15 Pro</span>
    </div>

    <div class="device">
      <div class="phone pixel">
        <div class="punch"></div>
        <div class="screen" data-screen-label="02 Login" data-od-id="login-android">
          <div class="statusbar">
            <span>9:41</span>
            <span class="icons">
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg>
              <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
              <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg>
            </span>
          </div>
          <div class="app"></div>
          <div class="nav-pill"></div>
        </div>
      </div>
      <span class="device-cap">Pixel 8 Pro</span>
    </div>
  </div>

  <button class="replay" id="replay" aria-label="Replay entrance">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
    Replay entrance
  </button>

<script>
(function(){
  const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PETALS = ['#2c694e','#377a5b','#46866a','#5fa17f','#7cbf9b','#9bd8b9','#a9dfc6','#8ed1b1'];
  function flowerSVG(){
    let p='';
    for(let i=0;i<8;i++) p+=`<ellipse class="petal" cx="120" cy="68" rx="32" ry="57" transform="rotate(${i*45} 120 120)" fill="${PETALS[i]}" fill-opacity="0.86"/>`;
    return `<g class="flower">${p}
      <circle cx="120" cy="120" r="20" fill="#0c1f17"/>
      <ellipse cx="113" cy="113" rx="6" ry="4.5" fill="rgba(154,215,184,.30)"/></g>`;
  }

  // line icons (monochrome, 1.7 stroke, currentColor)
  const I = {
    mail:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/></svg>',
    arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>',
    apple:'<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 12.04c-.03-2.6 2.12-3.84 2.22-3.9-1.21-1.78-3.09-2.02-3.76-2.05-1.6-.16-3.12.94-3.93.94-.81 0-2.06-.92-3.39-.89-1.74.02-3.35 1.01-4.25 2.57-1.81 3.14-.46 7.79 1.3 10.34.86 1.25 1.89 2.65 3.24 2.6 1.3-.05 1.79-.84 3.36-.84 1.56 0 2.01.84 3.38.81 1.39-.02 2.28-1.27 3.13-2.52.98-1.45 1.39-2.85 1.41-2.92-.03-.01-2.71-1.04-2.74-4.12M14.62 4.45c.72-.86 1.2-2.07 1.07-3.27-1.03.04-2.28.69-3.01 1.55-.66.76-1.24 1.98-1.08 3.15 1.14.09 2.31-.58 3.02-1.43"/></svg>',
    check:'<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="m4 7 8 6 8-6"/><path d="m15.5 14.5 1.8 1.8 3.2-3.4" stroke-width="2"/></svg>'
  };

  function appHTML(){
    return `
    <div class="login">
      <div class="brand">
        <div class="mark-sm"><svg class="mark" viewBox="0 0 240 240">${flowerSVG()}</svg></div>
        <div class="wm"><span class="ever">ever</span><span class="green">green</span></div>
      </div>
      <div class="welcome">
        <h1>Welcome back</h1>
        <p>Sign in to tend your garden.</p>
      </div>
      <form class="auth" novalidate>
        <label class="field">
          <span class="ic">${I.mail}</span>
          <input type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" aria-label="Email address">
        </label>
        <button type="submit" class="btn primary" disabled>Continue with email <span class="arr">${I.arrow}</span></button>
        <div class="hint" aria-live="polite"></div>
        <div class="divider"><span>or</span></div>
        <button type="button" class="btn oauth" data-p="google"><span class="gmark">G</span> Continue with Google</button>
        <button type="button" class="btn oauth" data-p="apple">${I.apple} Continue with Apple</button>
      </form>
      <p class="legal">By continuing, you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a>.</p>

      <div class="sent" hidden>
        <div class="sent-ic">${I.check}</div>
        <h2>Check your inbox</h2>
        <p>We sent a magic link to <b class="to"></b>. Tap it to finish signing in.</p>
        <div class="acts">
          <button type="button" class="btn primary openmail">Open mail app <span class="arr">${I.arrow}</span></button>
          <button type="button" class="btn ghost resend">Resend link</button>
          <button type="button" class="btn ghost back">Use a different email</button>
        </div>
      </div>
    </div>`;
  }

  const roots = Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r => r.querySelector('.app').innerHTML = appHTML());

  const EMAIL = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function setup(root){
    const form=root.querySelector('.auth'), input=root.querySelector('input[type=email]'),
          primary=root.querySelector('.btn.primary'), hint=root.querySelector('.hint'),
          field=root.querySelector('.field'), sent=root.querySelector('.sent'),
          login=root.querySelector('.login'), to=root.querySelector('.to'),
          back=root.querySelector('.back'), resend=root.querySelector('.resend');

    const valid=()=>EMAIL.test(input.value.trim());
    input.addEventListener('input',()=>{ primary.disabled=!valid(); field.classList.remove('invalid'); hint.classList.remove('err'); hint.textContent=''; });
    input.addEventListener('blur',()=>{ if(input.value && !valid()){ field.classList.add('invalid'); hint.classList.add('err'); hint.textContent='That email doesn’t look right.'; }});

    function showSent(){
      to.textContent=input.value.trim();
      gsap.to(login.querySelectorAll('.brand,.welcome,.auth,.legal'),{opacity:0,duration:.18,onComplete:()=>{
        login.querySelectorAll('.brand,.welcome,.auth,.legal').forEach(el=>el.style.visibility='hidden');
        sent.hidden=false;
        if(!REDUCE){
          gsap.fromTo(sent.querySelector('.sent-ic'),{scale:0,opacity:0},{scale:1,opacity:1,duration:.6,ease:'back.out(2)'});
          gsap.fromTo(sent.querySelectorAll('h2,p,.acts > *'),{y:14,opacity:0},{y:0,opacity:1,duration:.5,stagger:.06,ease:'power3.out',delay:.08});
        }
      }});
    }
    function showForm(){
      sent.hidden=true;
      login.querySelectorAll('.brand,.welcome,.auth,.legal').forEach(el=>{el.style.visibility='';});
      gsap.to(login.querySelectorAll('.brand,.welcome,.auth,.legal'),{opacity:1,duration:.25});
      hint.textContent=''; hint.classList.remove('err');
    }

    form.addEventListener('submit',e=>{e.preventDefault(); if(valid()) showSent();});
    root.querySelectorAll('.oauth').forEach(b=>b.addEventListener('click',()=>{
      const name=b.dataset.p==='google'?'Google':'Apple';
      hint.classList.remove('err'); hint.textContent='Opening '+name+'…';
    }));
    root.querySelector('.openmail').addEventListener('click',()=>{});
    back.addEventListener('click',showForm);
    resend.addEventListener('click',()=>{
      resend.textContent='Link resent ✓'; resend.setAttribute('data-wait','1');
      setTimeout(()=>{resend.textContent='Resend link'; resend.removeAttribute('data-wait');},2400);
    });
  }

  function animateIn(root){
    const login=root.querySelector('.login');
    // ensure form visible
    root.querySelector('.sent').hidden=true;
    login.querySelectorAll('.brand,.welcome,.auth,.legal').forEach(el=>el.style.visibility='');
    gsap.killTweensOf(root.querySelector('.flower'));
    gsap.set(root.querySelector('.flower'),{rotation:0,svgOrigin:'120 120'});

    const seq=[root.querySelector('.brand'),root.querySelector('.welcome h1'),root.querySelector('.welcome p'),
      root.querySelector('.field'),root.querySelector('.btn.primary'),root.querySelector('.divider'),
      root.querySelector('.oauth[data-p=google]'),root.querySelector('.oauth[data-p=apple]'),root.querySelector('.legal')];

    if(REDUCE){ gsap.set(seq,{opacity:1,y:0}); return; }
    gsap.set(seq,{opacity:0,y:18});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .fromTo(root.querySelector('.mark-sm'),{scale:.4,opacity:0},{scale:1,opacity:1,duration:.6,ease:'back.out(1.9)'})
      .to(seq,{opacity:1,y:0,duration:.62,stagger:.07},'-=0.35')
      .add(()=>{ gsap.to(root.querySelector('.flower'),{rotation:5,duration:6,svgOrigin:'120 120',ease:'sine.inOut',yoyo:true,repeat:-1}); });
  }

  roots.forEach(setup);
  function play(){ roots.forEach(animateIn); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(play);} else { play(); }
  setTimeout(()=>{ if(getComputedStyle(roots[0].querySelector('.legal')).opacity==='0') play(); },500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
