# Build scripts are disabled globally via .npmrc (ignore-scripts=true). These are explicitly
# acknowledged so pnpm doesn't error with ERR_PNPM_IGNORED_BUILDS. (esbuild still works for the
# Convex CLI — it loads its platform binary from its optional dependency, no build step needed.)
ignoredBuiltDependencies:
  - msgpackr-extract
  - browser-tabs-lock
  - bufferutil
  - core-js
  - esbuild
  - utf-8-validate

# Clerk's @clerk/expo pins peer `expo <56`; SDK 56 (RN 0.85 / React 19) is API-compatible.
peerDependencyRules:
  allowedVersions:
    expo: '56'
