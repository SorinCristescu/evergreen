
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}

  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .screen *{position:relative}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:40;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:40;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.32)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:40;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:40;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.28)}

  .statusbar{position:absolute;z-index:30;top:0;left:0;right:0;height:54px;display:flex;align-items:center;justify-content:space-between;padding:20px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg)}
  .pixel .statusbar{padding-top:16px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}

  .app{position:absolute;inset:0;z-index:10;padding:58px 22px 22px;display:flex;flex-direction:column;align-items:center}
  .pixel .app{padding-top:50px}

  .hero{display:flex;flex-direction:column;align-items:center;text-align:center}
  .markbox{position:relative;width:82px;height:82px;margin-bottom:11px}
  .halo{position:absolute;inset:-40%;border-radius:50%;background:radial-gradient(circle,rgba(77,175,130,.28) 0%,transparent 62%);filter:blur(10px);opacity:0}
  .mark{position:relative;width:100%;height:100%;display:block;overflow:visible}
  .eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--ever-500);margin-bottom:5px}
  .wordmark{font-family:var(--font-display);font-weight:600;font-size:33px;line-height:1;letter-spacing:-.03em;text-transform:lowercase}
  .wordmark .ever{color:var(--ever-900)}.wordmark .green{color:var(--ever-500)}
  .hero p{margin-top:9px;max-width:244px;font-size:12.5px;line-height:1.5;color:var(--fg-muted)}

  .loop{margin-top:16px;width:100%;display:flex;flex-direction:column;border-radius:18px;background:var(--ever-100);box-shadow:var(--neu-raised);overflow:hidden}
  .loop-row{display:flex;align-items:center;gap:12px;padding:10px 14px}
  .loop-row+.loop-row{border-top:1px solid rgba(22,39,30,.07)}
  .loop-ic{flex:none;width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed);color:var(--ever-500)}
  .loop-ic svg{width:20px;height:20px}
  .loop-tx{flex:1;min-width:0}
  .loop-tx b{display:block;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ever-900);letter-spacing:-.01em}
  .loop-tx span{display:block;font-size:11.5px;color:var(--fg-muted);margin-top:1px}
  .loop-no{flex:none;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}

  .foot{margin-top:auto;width:100%;display:flex;flex-direction:column;gap:8px;padding-top:14px}
  .btn{display:flex;align-items:center;justify-content:center;gap:10px;height:50px;border:0;cursor:pointer;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-raised);font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--ever-700);transition:box-shadow .14s,transform .14s;-webkit-tap-highlight-color:transparent}
  .btn:hover{transform:translateY(-1px)}.btn:active{box-shadow:var(--neu-pressed);transform:translateY(0)}
  .btn .arr{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-tint);color:var(--ever-500)}
  .ghost{align-self:center;border:0;background:transparent;cursor:pointer;font-family:var(--font-body);font-weight:500;font-size:13px;color:var(--fg-muted);padding:4px 10px}
  .ghost:hover{color:var(--ever-700)}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>

  <header class="studio-head">
    <span class="kicker">Evergreen · 09 Welcome</span>
    <h1>One-time welcome → opens into Garden</h1>
  </header>

  <div class="gallery">
    <div class="device">
      <div class="phone iphone">
        <div class="island"></div>
        <div class="screen" data-screen-label="09 Welcome" data-od-id="welcome-ios">
          <div class="statusbar"><span>9:41</span><span class="icons">
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg>
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
          </span></div>
          <div class="app"></div>
          <div class="home-ind"></div>
        </div>
      </div>
      <span class="device-cap">iPhone 15 Pro</span>
    </div>

    <div class="device">
      <div class="phone pixel">
        <div class="punch"></div>
        <div class="screen" data-screen-label="09 Welcome" data-od-id="welcome-android">
          <div class="statusbar"><span>9:41</span><span class="icons">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg>
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
            <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg>
          </span></div>
          <div class="app"></div>
          <div class="nav-pill"></div>
        </div>
      </div>
      <span class="device-cap">Pixel 8 Pro</span>
    </div>
  </div>

  <button class="replay" id="replay" aria-label="Replay entrance">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
    Replay
  </button>

<script>
(function(){
  const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PETALS=['#2c694e','#377a5b','#46866a','#5fa17f','#7cbf9b','#9bd8b9','#a9dfc6','#8ed1b1'];
  function flowerSVG(){let p='';for(let i=0;i<8;i++)p+=`<ellipse class="petal" cx="120" cy="68" rx="32" ry="57" transform="rotate(${i*45} 120 120)" fill="${PETALS[i]}" fill-opacity="0.86"/>`;
    return `<g class="flower">${p}<circle class="heart" cx="120" cy="120" r="20" fill="#0c1f17"/><ellipse cx="113" cy="113" rx="6" ry="4.5" fill="rgba(154,215,184,.30)"/></g>`;}
  const I={
    arrow:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>',
    scan:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2"/><circle cx="12" cy="12" r="3"/></svg>',
    care:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3s6 6.4 6 11a6 6 0 0 1-12 0c0-4.6 6-11 6-11Z"/><path d="m9.5 13 1.8 1.8 3.2-3.4"/></svg>',
    diag:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3v6a4 4 0 0 0 8 0V3"/><path d="M5 3H4M13 3h1"/><path d="M9 13v3a4 4 0 0 0 7 2.8"/><circle cx="18" cy="18" r="2.4"/></svg>',
    connect:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 6.2a3 3 0 0 1 0 5.6M18.5 20a5.5 5.5 0 0 0-3-4.9"/></svg>'
  };
  const LOOP=[
    {ic:'scan',t:'Identify',d:'Point your camera, know any plant.'},
    {ic:'care',t:'Care',d:'A routine tuned to your home, gentle reminders.'},
    {ic:'diag',t:'Diagnose',d:'Spot trouble early with Dr. Plant.'},
    {ic:'connect',t:'Connect',d:'Share wins with fellow gardeners.'}
  ];

  function appHTML(){
    const rows=LOOP.map((l,i)=>`<div class="loop-row"><span class="loop-ic">${I[l.ic]}</span>
      <span class="loop-tx"><b>${l.t}</b><span>${l.d}</span></span><span class="loop-no">0${i+1}</span></div>`).join('');
    return `
    <div class="hero">
      <div class="markbox"><div class="halo"></div><svg class="mark" viewBox="0 0 240 240">${flowerSVG()}</svg></div>
      <div class="eyebrow">Welcome to</div>
      <div class="wordmark"><span class="ever">ever</span><span class="green">green</span></div>
      <p>Everything you need to keep them thriving — in one calm place.</p>
    </div>
    <div class="loop">${rows}</div>
    <div class="foot">
      <button type="button" class="btn enter">Enter your garden <span class="arr">${I.arrow}</span></button>
      <button type="button" class="ghost">Take the 30-second tour</button>
    </div>`;
  }

  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());
  roots.forEach(r=>{
    r.querySelector('.enter').addEventListener('click',()=>{});
    r.querySelector('.ghost').addEventListener('click',()=>{});
  });

  function animateIn(root){
    const fl=root.querySelector('.flower'),petals=root.querySelectorAll('.petal'),heart=root.querySelector('.heart');
    gsap.killTweensOf([fl,root.querySelector('.halo')]);
    gsap.set(fl,{rotation:0,svgOrigin:'120 120'});
    const seq=[root.querySelector('.eyebrow'),root.querySelector('.wordmark'),root.querySelector('.hero p'),
      ...root.querySelectorAll('.loop-row'),root.querySelector('.foot')];
    if(REDUCE){gsap.set([petals,heart,root.querySelector('.halo')],{opacity:1,scale:1});gsap.set(seq,{opacity:1,y:0});return;}
    gsap.set([petals,heart],{svgOrigin:'120 120'});
    gsap.set(seq,{opacity:0,y:16});gsap.set(root.querySelector('.halo'),{opacity:0,scale:.4});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .fromTo(root.querySelector('.halo'),{scale:.4,opacity:0},{scale:1,opacity:1,duration:.9,ease:'power2.out'},0)
      .fromTo(heart,{scale:0,opacity:0},{scale:1,opacity:1,duration:.6,ease:'back.out(2.2)'},.1)
      .fromTo(petals,{scale:0,opacity:0},{scale:1,opacity:.86,duration:.72,ease:'back.out(1.7)',stagger:.07},'-=0.32')
      .to(seq,{opacity:1,y:0,duration:.55,stagger:.06},'-=0.25')
      .add(()=>{gsap.to(fl,{rotation:5,duration:6,svgOrigin:'120 120',ease:'sine.inOut',yoyo:true,repeat:-1});
        gsap.to(root.querySelector('.halo'),{scale:1.08,opacity:.8,duration:3.4,ease:'sine.inOut',yoyo:true,repeat:-1});});
  }

  function play(){roots.forEach(animateIn);}
  gsap.set(document.querySelectorAll('.petal,.heart,.halo,.eyebrow,.wordmark,.hero p,.loop-row,.foot'),{opacity:0});
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.foot')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
