<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Acknowledgements</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--terra:#c76b4f;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}
  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}
  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}
  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:60;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:60;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.4)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:60;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:60;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.34)}
  .statusbar{position:absolute;z-index:55;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);pointer-events:none}
  .pixel .statusbar{padding-top:15px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}
  .app{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}

  .hd{flex:none;padding:50px 12px 4px;display:flex;align-items:center;gap:8px}
  .pixel .hd{padding-top:44px}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-700);flex:none;-webkit-tap-highlight-color:transparent}
  .iconbtn:active{box-shadow:var(--neu-pressed)}
  .hd h2{flex:1;font-family:var(--font-display);font-weight:600;font-size:18px;color:var(--ever-900);letter-spacing:-.02em}

  .content{flex:1;min-height:0;overflow-y:auto;padding:6px 18px 28px;scrollbar-width:none}
  .content::-webkit-scrollbar{display:none}
  .thanks{text-align:center;padding:8px 6px 16px}
  .thanks .markbox{width:48px;height:48px;margin:0 auto 10px}
  .thanks .mark{width:100%;height:100%;display:block;overflow:visible}
  .thanks p{font-size:13.5px;line-height:1.6;color:var(--fg-muted);max-width:250px;margin:0 auto}
  .thanks p b{color:var(--ever-700);font-weight:600}
  .sec-l{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-subtle);margin:14px 4px 9px}
  .card{border-radius:16px;background:var(--ever-100);box-shadow:var(--neu-raised);overflow:hidden;margin-bottom:6px}
  .crow{display:flex;align-items:center;gap:12px;padding:11px 14px}
  .crow+.crow{border-top:1px solid rgba(22,39,30,.07)}
  .crow .ci{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed);color:var(--ever-500)}
  .crow .cx{flex:1;min-width:0}
  .crow .cx b{display:block;font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ever-900);letter-spacing:-.01em}
  .crow .cx span{display:block;font-size:11px;color:var(--fg-muted);margin-top:1px}
  .foot{margin-top:20px;text-align:center;padding-top:16px;font-size:11.5px;color:var(--fg-subtle);line-height:1.6}
  .foot .heart{color:var(--terra);display:inline-block;vertical-align:-1px}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}
  @media (max-width:740px){.iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}.pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>
  <header class="studio-head"><span class="kicker">Evergreen · 26 Acknowledgements</span><h1>A warm thank-you to the plant community</h1></header>
  <div class="gallery">
    <div class="device"><div class="phone iphone"><div class="island"></div>
      <div class="screen" data-screen-label="26 Acknowledgements" data-od-id="ack-ios"><div class="statusbar"><span>9:41</span><span class="icons"><svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg></span></div><div class="app"></div><div class="home-ind"></div></div></div><span class="device-cap">iPhone 15 Pro</span></div>
    <div class="device"><div class="phone pixel"><div class="punch"></div>
      <div class="screen" data-screen-label="26 Acknowledgements" data-od-id="ack-android"><div class="statusbar"><span>9:41</span><span class="icons"><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg><svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg><svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg></span></div><div class="app"></div><div class="nav-pill"></div></div></div><span class="device-cap">Pixel 8 Pro</span></div>
  </div>
  <button class="replay" id="replay" aria-label="Replay"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>Replay</button>
<script>
(function(){
  const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const PETALS=['#2c694e','#377a5b','#46866a','#5fa17f','#7cbf9b','#9bd8b9','#a9dfc6','#8ed1b1'];
  function flowerSVG(){let p='';for(let i=0;i<8;i++)p+=`<ellipse class="petal" cx="120" cy="68" rx="32" ry="57" transform="rotate(${i*45} 120 120)" fill="${PETALS[i]}" fill-opacity="0.88"/>`;
    return `<g class="flower">${p}<circle class="heart" cx="120" cy="120" r="20" fill="#0c1f17"/><ellipse cx="113" cy="113" rx="6" ry="4.5" fill="rgba(154,215,184,.3)"/></g>`;}
  const back='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>';
  const ic={
    data:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="6" rx="7" ry="3"/><path d="M5 6v12c0 1.7 3 3 7 3s7-1.3 7-3V6M5 12c0 1.7 3 3 7 3s7-1.3 7-3"/></svg>',
    type:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7V5h14v2M12 5v14M9 19h6"/></svg>',
    users:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 6.2a3 3 0 0 1 0 5.6M18.5 20a5.5 5.5 0 0 0-3-4.9"/></svg>'
  };
  const DATA=[['GBIF','Global occurrence data for species ranges'],['Plant.id','Identification & disease detection'],['Anthropic Claude','Care guidance & explanations'],['OpenWeather','Local forecasts & climate']];
  const TYPE=[['General Sans','Indian Type Foundry — display'],['Inter','Rasmus Andersson — body'],['JetBrains Mono','JetBrains — data & numerics']];
  function rows(list,k){return list.map(([a,b])=>`<div class="crow"><span class="ci">${ic[k]}</span><span class="cx"><b>${a}</b><span>${b}</span></span></div>`).join('');}
  function appHTML(){return `
    <div class="hd"><button class="iconbtn back">${back}</button><h2>Acknowledgements</h2></div>
    <div class="content">
      <div class="thanks"><div class="markbox"><svg class="mark" viewBox="0 0 240 240">${flowerSVG()}</svg></div>
        <p>Evergreen stands on the shoulders of a generous plant community, open science, and beautiful tools. <b style="white-space:nowrap">Thank you!</b></p></div>
      <div class="sec-l">Data & science</div>
      <div class="card">${rows(DATA,'data')}</div>
      <div class="sec-l">And especially</div>
      <div class="card"><div class="crow"><span class="ci">${ic.users}</span><span class="cx"><b>Every gardener</b><span>Who shared a photo, a tip, or a rescue.</span></span></div></div>
      <div class="foot">Made with <span class="heart">♥</span> for plant people · Lisbon</div>
    </div>`;}
  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());
  roots.forEach(r=>r.querySelector('.back').addEventListener('click',()=>{}));
  function animateIn(root){
    const fl=root.querySelector('.flower'),petals=root.querySelectorAll('.petal'),heart=root.querySelector('.heart');
    const seq=[root.querySelector('.thanks p'),...root.querySelectorAll('.sec-l, .card'),root.querySelector('.foot')];
    if(REDUCE){gsap.set([petals,heart,seq],{opacity:1,y:0,scale:1});return;}
    gsap.set([petals,heart],{svgOrigin:'120 120'});gsap.set(seq,{opacity:0,y:14});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .fromTo(heart,{scale:0,opacity:0},{scale:1,opacity:1,duration:.5,ease:'back.out(2.2)'})
      .fromTo(petals,{scale:0,opacity:0},{scale:1,opacity:.88,duration:.6,ease:'back.out(1.7)',stagger:.05},'-=0.25')
      .to(seq,{opacity:1,y:0,duration:.42,stagger:.05},'-=0.1')
      .add(()=>gsap.to(fl,{rotation:5,duration:6,svgOrigin:'120 120',ease:'sine.inOut',yoyo:true,repeat:-1}));
  }
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.thanks p')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
