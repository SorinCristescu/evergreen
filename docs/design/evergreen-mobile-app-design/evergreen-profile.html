
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--warning:#b5821f;--terra:#c76b4f;
    --fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  /* dark theme (design system Evergreen-900) — scoped to a screen */
  .screen.dark{
    --ever-100:#0e221a;--fg:#eaf3ed;--fg-muted:#9fd4ba;--fg-subtle:#6f9a85;--ever-900:#eef6f1;--ever-700:#bfe3cf;
    --accent-tint:rgba(77,175,130,.2);
    --neu-raised:6px 6px 14px rgba(0,0,0,.42), -5px -5px 12px rgba(255,255,255,.045);
    --neu-raised-sm:4px 4px 9px rgba(0,0,0,.4), -3px -3px 8px rgba(255,255,255,.04);
    --neu-pressed:inset 4px 4px 9px rgba(0,0,0,.45), inset -3px -3px 8px rgba(255,255,255,.045);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}

  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100);transition:background .35s}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:60;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:60;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.4)}
  .screen.dark .iphone .home-ind,.iphone .screen.dark .home-ind{background:rgba(255,255,255,.5)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:60;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:60;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.34)}
  .screen.dark .nav-pill{background:rgba(255,255,255,.5)}

  .statusbar{position:absolute;z-index:55;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);pointer-events:none}
  .pixel .statusbar{padding-top:15px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}

  .app{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}
  .content{flex:1;overflow-y:auto;padding:52px 18px 88px;scrollbar-width:none}
  .pixel .content{padding-top:46px}
  .content::-webkit-scrollbar{display:none}

  /* profile header */
  .phead{display:flex;align-items:center;gap:13px;margin-bottom:8px}
  .pavatar{position:relative;width:60px;height:60px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:21px;color:#fff;background:linear-gradient(150deg,#4daf82,#2c694e);background-size:cover;background-position:center;box-shadow:var(--neu-raised-sm);cursor:pointer;-webkit-tap-highlight-color:transparent}
  .pavatar.has-photo .ini{display:none}
  .pavatar .avcam{position:absolute;right:-2px;bottom:-2px;width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-500)}
  .pavatar .avcam svg{width:13px;height:13px}
  .pinfo{flex:1;min-width:0}
  .pinfo b{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--ever-900);letter-spacing:-.02em}
  .pinfo .handle{font-family:var(--font-mono);font-size:11.5px;color:var(--fg-subtle);margin-top:1px}
  .viewpub{display:inline-flex;align-items:center;gap:4px;margin-top:6px;border:0;background:transparent;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:12px;color:var(--ever-500);padding:0}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0}
  .stat{padding:13px 8px;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-raised);text-align:center}
  .stat b{display:block;font-family:var(--font-mono);font-weight:600;font-size:22px;color:var(--ever-700);font-variant-numeric:tabular-nums}
  .stat span{font-size:10.5px;color:var(--fg-muted)}
  .stat.streak b{color:var(--terra)}

  /* premium card */
  .premium{position:relative;overflow:hidden;border-radius:20px;padding:18px;margin-bottom:18px;color:#eaf3ed;
    background:radial-gradient(80% 120% at 85% 10%,rgba(77,175,130,.45),transparent 55%),linear-gradient(150deg,#1b4332,#0c1f17)}
  .premium .pw{font-family:var(--font-display);font-weight:600;font-size:18px;letter-spacing:-.02em}
  .premium .pw .pl{color:var(--ever-400)}
  .premium p{font-size:12.5px;color:#bfe0cf;margin-top:4px;line-height:1.45;max-width:200px}
  .premium .pbtn{margin-top:13px;display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border:0;cursor:pointer;border-radius:11px;background:#eaf3ed;color:var(--ever-700);font-family:var(--font-body);font-weight:600;font-size:13px}
  .premium .star{position:absolute;top:14px;right:16px;color:var(--ever-400)}

  .sec-l{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-subtle);margin:6px 2px 10px}
  .card{border-radius:16px;background:var(--ever-100);box-shadow:var(--neu-raised);overflow:hidden;margin-bottom:18px}
  .row{display:flex;align-items:center;gap:13px;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;border:0;background:transparent;width:100%;text-align:left}
  .row+.row{border-top:1px solid rgba(22,39,30,.07)}
  .screen.dark .row+.row{border-top-color:rgba(159,212,186,.1)}
  .row .ri{width:38px;height:38px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed);color:var(--ever-500)}
  .row .rx{flex:1;min-width:0}
  .row .rx b{display:block;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ever-900);letter-spacing:-.01em}
  .row .rx span{display:block;font-size:11.5px;color:var(--fg-muted);margin-top:1px}
  .row .rt{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
  .row .chev{color:var(--fg-subtle);flex:none}
  .row.gated .ri{color:var(--warning)}
  .lock{color:var(--warning)}

  /* toggle */
  .toggle{position:relative;width:46px;height:27px;border-radius:999px;flex:none;cursor:pointer;border:0;background:var(--ever-100);box-shadow:var(--neu-pressed);transition:background .2s}
  .toggle .knob{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .22s cubic-bezier(.16,1,.3,1),background .2s}
  .toggle[aria-pressed=true]{background:var(--ever-500)}
  .toggle[aria-pressed=true] .knob{transform:translateX(19px)}

  /* tab bar (no FAB on Profile) */
  .tabbar{position:absolute;z-index:50;left:10px;right:10px;bottom:16px;height:62px;display:flex;align-items:center;padding:0 8px;border-radius:22px;background:var(--ever-100);box-shadow:var(--neu-raised)}
  .pixel .tabbar{bottom:18px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:0;background:transparent;cursor:pointer;color:var(--fg-subtle);font-family:var(--font-body);font-size:9.5px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:color .15s}
  .tab[aria-selected=true]{color:var(--ever-700);font-weight:600}
  .tab[aria-selected=true] svg{color:var(--ever-500)}

  /* paywall sheet */
  .scrim{position:absolute;inset:0;z-index:57;background:rgba(11,24,18,.3);opacity:0;pointer-events:none;transition:opacity .25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;z-index:58;left:0;right:0;bottom:0;border-radius:26px 26px 0 0;background:var(--ever-100);box-shadow:0 -16px 40px rgba(0,0,0,.28);padding:10px 20px calc(22px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .34s cubic-bezier(.16,1,.3,1)}
  .sheet.open{transform:translateY(0)}
  .handle{width:40px;height:5px;border-radius:3px;background:rgba(22,39,30,.18);margin:4px auto 16px}
  .screen.dark .handle{background:rgba(159,212,186,.25)}
  .pw-head{text-align:center;margin-bottom:16px}
  .pw-head .pw{font-family:var(--font-display);font-weight:600;font-size:24px;color:var(--ever-900);letter-spacing:-.02em}
  .pw-head .pw .pl{color:var(--ever-500)}
  .pw-head p{font-size:13px;color:var(--fg-muted);margin-top:5px}
  .benefit{display:flex;align-items:center;gap:11px;padding:9px 2px;font-size:13.5px;color:var(--fg)}
  .benefit .bc{width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;background:var(--accent-tint);color:var(--ever-500)}
  .pw-price{text-align:center;margin:14px 0 12px;font-size:13px;color:var(--fg-muted)}
  .pw-price b{font-family:var(--font-mono);font-weight:600;color:var(--ever-700);font-size:15px}
  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;height:52px;border:0;cursor:pointer;border-radius:16px;background:var(--ever-100);box-shadow:var(--neu-raised);font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--ever-700);transition:box-shadow .14s}
  .btn:active{box-shadow:var(--neu-pressed)}
  .btn .arr{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-tint);color:var(--ever-500)}
  .pw-restore{display:block;width:100%;text-align:center;border:0;background:transparent;cursor:pointer;font-family:var(--font-body);font-weight:500;font-size:13px;color:var(--fg-muted);padding:10px 0 2px}

  .toast{position:absolute;z-index:62;left:18px;right:18px;bottom:96px;display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:14px;background:var(--ever-900);color:#eaf3ed;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .screen.dark .toast{background:#04100a;color:#eaf3ed}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast svg{color:var(--ever-400);flex:none}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:#1b4332;background:#d8e9df;box-shadow:6px 6px 14px rgba(11,30,21,.13),-6px -6px 13px rgba(255,255,255,.8);border:0;transition:transform .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}
  .replay svg{width:17px;height:17px;stroke:#2c694e}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>

    <div class="device">

        <div class="screen" data-screen-label="15 Profile" data-od-id="profile-android">
          <div class="statusbar"><span>9:41</span><span class="icons">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg>
            <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
            <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg>
          </span></div>
          <div class="app"></div>
          <div class="nav-pill"></div>
        </div>
      </div>
      <span class="device-cap">Pixel 8 Pro</span>
    </div>
  </div>

  <button class="replay" id="replay" aria-label="Replay entrance">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
    Replay
  </button>

<script>
(function(){
  const REDUCE = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const I={
    chev:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>',

    star:'<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2Z"/></svg>',
    starline:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5.8L21 9.5l-5 4.3L17.5 21 12 17.5 6.5 21 8 13.8 3 9.5l6.5-.7Z"/></svg>',
    pin:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 5-8 12-8 12s-8-7-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.6"/></svg>',
    plus:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
    lock:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>',
    memorial:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21c-4-3-7-6-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 4-3 7-7 10Z"/></svg>',
    wish:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l2.5 5.8L21 9.5l-5 4.3L17.5 21 12 17.5 6.5 21 8 13.8 3 9.5l6.5-.7Z"/></svg>',
    history:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v4h4"/><path d="M12 8v4l3 2"/></svg>',
    bell:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>',
    perm:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 5 6v5c0 4.2 2.9 7.6 7 9 4.1-1.4 7-4.8 7-9V6Z"/></svg>',
    moon:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 8 8 0 1 0 20 14.5Z"/></svg>',
    cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a2 2 0 0 1 2-2h1l.8-1.2A2 2 0 0 1 9.5 4h5a2 2 0 0 1 1.7.8L17 6h1a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/><circle cx="12" cy="13" r="3"/></svg>',
    acct:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>',
    info:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 11v5M12 8h.01"/></svg>',
    t_today:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h7"/><path d="m3.5 6 1 1 1.5-2M3.5 12l1 1 1.5-2M3.5 18l1 1 1.5-2"/></svg>',
    t_garden:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4c-8 0-14 5-14 12a6 6 0 0 0 12 0c1-5 1-8 2-12Z"/><path d="M7 21c0-6 3-10 8-13"/></svg>',
    t_comm:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 6.2a3 3 0 0 1 0 5.6M18.5 20a5.5 5.5 0 0 0-3-4.9"/></svg>',
    t_profile:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>'
  };

  function appHTML(){
    return `
    <div class="content">
      <div class="phead">
        <label class="pavatar" aria-label="Change profile photo"><span class="ini">SC</span><span class="avcam">${I.cam}</span><input type="file" accept="image/*" class="avfile" hidden></label>
        <span class="pinfo"><b>Sorin C.</b><span class="handle">@sorin.grows</span>
          <button class="viewpub">View public profile ${I.ext}</button></span>
      </div>
      <div class="stats">
        <div class="stat"><b>7</b><span>Plants</span></div>
        <div class="stat streak"><b>12</b><span>Day streak</span></div>
        <div class="stat"><b>248</b><span>Tasks done</span></div>
      </div>
      <div class="premium">
        <span class="star">${I.star}</span>
        <div class="pw"><span>ever</span><span class="pl">green</span>+</div>
        <p>Multiple homes, Dr. Plant, unlimited IDs &amp; community posting.</p>
        <button class="pbtn upgrade">${I.starline} Start free trial</button>
      </div>

      <div class="sec-l">Your locations</div>
      <div class="card">
        <button class="row loc"><span class="ri">${I.pin}</span><span class="rx"><b>Home · Lisbon</b><span>Mediterranean · Beginner · 7 plants</span></span><span class="chev">${I.chev}</span></button>
        <button class="row gated addloc"><span class="ri">${I.plus}</span><span class="rx"><b>Add a location <span class="lock">${I.lock}</span></b><span>evergreen+ unlocks multiple homes</span></span><span class="chev">${I.chev}</span></button>
      </div>

      <div class="sec-l">Your garden, kept</div>
      <div class="card">
        <button class="row"><span class="ri">${I.memorial}</span><span class="rx"><b>Memorial</b></span><span class="rt">2</span><span class="chev">${I.chev}</span></button>
        <button class="row"><span class="ri">${I.wish}</span><span class="rx"><b>Wishlist</b></span><span class="rt">5</span><span class="chev">${I.chev}</span></button>
        <button class="row"><span class="ri">${I.history}</span><span class="rx"><b>Identification history</b></span><span class="rt">14</span><span class="chev">${I.chev}</span></button>
      </div>

      <div class="sec-l">Settings</div>
      <div class="card">
        <button class="row"><span class="ri">${I.bell}</span><span class="rx"><b>Notifications</b></span><span class="chev">${I.chev}</span></button>
        <button class="row"><span class="ri">${I.perm}</span><span class="rx"><b>Permissions</b></span><span class="chev">${I.chev}</span></button>
        <div class="row" style="cursor:default"><span class="ri">${I.moon}</span><span class="rx"><b>Dark theme</b><span class="darklbl">Off</span></span><button class="toggle darktoggle" aria-pressed="false" aria-label="Toggle dark theme"><span class="knob"></span></button></div>
        <button class="row"><span class="ri">${I.acct}</span><span class="rx"><b>Account</b><span>Export · delete</span></span><span class="chev">${I.chev}</span></button>
        <button class="row"><span class="ri">${I.info}</span><span class="rx"><b>About &amp; legal</b></span><span class="chev">${I.chev}</span></button>
      </div>
    </div>

    <div class="scrim"></div>
    <div class="sheet">
      <div class="handle"></div>
      <div class="pw-head"><div class="pw"><span>ever</span><span class="pl">green</span>+</div><p>Unlock the whole garden.</p></div>
      <div class="benefit"><span class="bc">${I.check}</span>Multiple locations — a home for every home</div>
      <div class="benefit"><span class="bc">${I.check}</span>Dr. Plant diagnoses, unlimited</div>
      <div class="benefit"><span class="bc">${I.check}</span>Unlimited identifications</div>
      <div class="benefit"><span class="bc">${I.check}</span>Post &amp; swap in the community</div>
      <div class="pw-price"><b>€4.99 / month</b> · 7-day free trial, cancel anytime</div>
      <button class="btn startfree">Start free trial <span class="arr">${I.arrow}</span></button>
      <button class="pw-restore">Restore purchase</button>
    </div>
    <div class="toast"><span class="tic">${I.check}</span><span class="tmsg"></span></div>

    <div class="tabbar">
      <button class="tab" aria-selected="false">${I.t_today}<span>Today</span></button>
      <button class="tab" aria-selected="false">${I.t_garden}<span>Garden</span></button>
      <button class="tab" aria-selected="false">${I.t_comm}<span>Community</span></button>
      <button class="tab" aria-selected="true">${I.t_profile}<span>Profile</span></button>
    </div>`;
  }

  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());

  function setup(root){
    const scrim=root.querySelector('.scrim'),sheet=root.querySelector('.sheet'),toast=root.querySelector('.toast'),tmsg=root.querySelector('.tmsg');
    function showToast(m){tmsg.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2400);}
    // avatar photo upload
    const av=root.querySelector('.pavatar'),avfile=root.querySelector('.avfile');
    avfile.addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];if(!f)return;
      const url=URL.createObjectURL(f);av.style.backgroundImage='url('+url+')';av.classList.add('has-photo');showToast('Profile photo updated');});
    function openPay(){scrim.classList.add('open');sheet.classList.add('open');}
    function closePay(){scrim.classList.remove('open');sheet.classList.remove('open');}
    root.querySelector('.upgrade').addEventListener('click',openPay);
    root.querySelector('.addloc').addEventListener('click',openPay);
    scrim.addEventListener('click',closePay);
    root.querySelector('.startfree').addEventListener('click',()=>{closePay();showToast('Trial started — welcome to evergreen+');});
    root.querySelector('.pw-restore').addEventListener('click',()=>showToast('Checking for previous purchases…'));
    // dark theme toggle
    const tg=root.querySelector('.darktoggle'),lbl=root.querySelector('.darklbl');
    tg.addEventListener('click',()=>{const on=tg.getAttribute('aria-pressed')==='true';tg.setAttribute('aria-pressed',!on);root.classList.toggle('dark',!on);lbl.textContent=!on?'On':'Off';});
    // tabs
    const tabs=Array.from(root.querySelectorAll('.tabbar .tab'));
    tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.setAttribute('aria-selected','false'));t.setAttribute('aria-selected','true');}));
    root.querySelectorAll('.viewpub,.loc,.row:not(.addloc):not(.upgrade)').forEach(el=>el.addEventListener('click',()=>{}));
  }

  function animateIn(root){
    const blocks=[root.querySelector('.phead'),root.querySelector('.stats'),root.querySelector('.premium'),...root.querySelectorAll('.sec-l, .card')];
    const bar=root.querySelector('.tabbar');
    if(REDUCE){gsap.set([blocks,bar],{opacity:1,y:0});return;}
    gsap.set(blocks,{opacity:0,y:18});gsap.set(bar,{opacity:0,y:80});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .to(blocks,{opacity:1,y:0,duration:.5,stagger:.06})
      .to(bar,{opacity:1,y:0,duration:.55,ease:'back.out(1.4)'},'-=0.45');
  }

  roots.forEach(setup);
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.tabbar')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
