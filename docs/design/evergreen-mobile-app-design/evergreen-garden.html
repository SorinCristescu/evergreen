
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--warning:#b5821f;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}

  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:60;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:60;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.4)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:60;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:60;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.34)}

  .statusbar{position:absolute;z-index:55;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);pointer-events:none}
  .pixel .statusbar{padding-top:15px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}

  .app{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}

  /* header */
  .ghd{padding:52px 18px 12px;flex:none}
  .pixel .ghd{padding-top:46px}
  .ghd-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .switcher{display:inline-flex;align-items:center;gap:7px;border:0;background:transparent;cursor:pointer;font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:-.02em;color:var(--ever-900);padding:4px 6px;border-radius:12px;-webkit-tap-highlight-color:transparent}
  .switcher .chev{color:var(--ever-500);display:flex}
  .ghd-actions{display:flex;gap:9px}
  .iconbtn{position:relative;width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-700);transition:box-shadow .14s}
  .iconbtn:active{box-shadow:var(--neu-pressed)}
  .iconbtn .badge{position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--warning);box-shadow:0 0 0 2px var(--ever-100)}
  .ghd-sub{margin:6px 6px 0;display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11.5px;color:var(--fg-muted)}
  .ghd-sub .sun{color:#f5c451;display:flex}

  /* place chips */
  .chips{flex:none;display:flex;gap:8px;padding:12px 18px 12px;overflow-x:auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;height:34px;padding:0 15px;border:0;cursor:pointer;border-radius:999px;background:var(--ever-100);box-shadow:var(--neu-raised-sm);font-family:var(--font-body);font-weight:500;font-size:13px;color:var(--fg-muted);transition:box-shadow .14s,color .14s;-webkit-tap-highlight-color:transparent}
  .chip[aria-pressed=true]{box-shadow:var(--neu-pressed);color:var(--ever-700);font-weight:600}

  /* scrollable content */
  .content{flex:1;overflow-y:auto;padding:4px 18px 86px;scrollbar-width:none}
  .content::-webkit-scrollbar{display:none}
  .grp{margin-top:16px}
  .grp-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:11px}
  .grp-hd b{font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ever-900);letter-spacing:-.01em}
  .grp-hd .pl{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-subtle)}
  .grp-hd .ct{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle)}
  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  .pcard{border-radius:16px;background:var(--ever-100);box-shadow:var(--neu-raised);overflow:hidden;cursor:pointer;transition:transform .14s,box-shadow .14s;-webkit-tap-highlight-color:transparent}
  .pcard:hover{transform:translateY(-2px)}
  .pcard:active{box-shadow:var(--neu-pressed)}
  .cover{position:relative;height:92px;display:flex;align-items:center;justify-content:center}
  .cover .ph{opacity:.5;color:rgba(255,255,255,.85)}
  .cover .sdot{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .cover .sdot.warn{color:var(--warning)}.cover .sdot.ok{color:var(--ever-500)}.cover .sdot.good{color:var(--leaf)}
  .pbody{padding:9px 11px 11px}
  .pbody .nm{font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--ever-900);letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pbody .sp{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .pbody .st{margin-top:7px;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500}
  .pbody .st.warn{color:var(--warning)}.pbody .st.ok{color:var(--fg-muted)}.pbody .st.good{color:var(--leaf)}
  .pbody .st svg{flex:none}

  .empty{border-radius:16px;padding:26px 18px;text-align:center;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .empty svg{color:var(--ever-500);opacity:.7;margin-bottom:8px}
  .empty b{display:block;font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--ever-700)}
  .empty span{display:block;font-size:12px;color:var(--fg-muted);margin-top:3px}

  .manage{margin:18px 0 6px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;height:46px;border:0;cursor:pointer;border-radius:14px;background:var(--ever-100);box-shadow:var(--neu-raised-sm);font-family:var(--font-body);font-weight:600;font-size:13.5px;color:var(--ever-700);-webkit-tap-highlight-color:transparent}
  .manage:active{box-shadow:var(--neu-pressed)}
  .manage svg{color:var(--ever-500)}

  /* tab bar */
  .tabbar{position:absolute;z-index:50;left:10px;right:10px;bottom:16px;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-radius:22px;background:var(--ever-100);box-shadow:var(--neu-raised)}
  .pixel .tabbar{bottom:18px}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:0;background:transparent;cursor:pointer;color:var(--fg-subtle);font-family:var(--font-body);font-size:9.5px;font-weight:500;-webkit-tap-highlight-color:transparent;transition:color .15s}
  .tab[aria-selected=true]{color:var(--ever-700);font-weight:600}
  .tab[aria-selected=true] svg{color:var(--ever-500)}
  .tab.spacer{visibility:hidden}
  .fab{position:absolute;z-index:51;left:50%;top:-18px;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised);color:var(--ever-500);transition:transform .16s,box-shadow .16s;-webkit-tap-highlight-color:transparent}
  .fab:hover{transform:translateX(-50%) translateY(-2px)}
  .fab:active{box-shadow:var(--neu-pressed)}

  /* fab action sheet */
  .sheet{position:absolute;z-index:58;left:14px;right:14px;bottom:88px;border-radius:18px;background:var(--ever-100);box-shadow:var(--neu-raised);padding:7px;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .2s,transform .2s}
  .sheet.open{opacity:1;transform:translateY(0);pointer-events:auto}
  .sheet button{width:100%;display:flex;align-items:center;gap:12px;padding:12px 13px;border:0;background:transparent;border-radius:12px;cursor:pointer;text-align:left;font-family:var(--font-body);font-size:14px;font-weight:500;color:var(--fg)}
  .sheet button:hover{background:var(--accent-tint)}
  .sheet button:first-child{margin-bottom:2px}
  .sheet .si{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed);color:var(--ever-500);flex:none}
  .sheet .st2{display:block;font-size:11.5px;color:var(--fg-muted);font-weight:400}
  .scrim{position:absolute;inset:0;z-index:57;background:rgba(11,24,18,.18);opacity:0;pointer-events:none;transition:opacity .2s}
  .scrim.open{opacity:1;pointer-events:auto}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>

    t_today:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h7"/><path d="m3.5 6 1 1 1.5-2M3.5 12l1 1 1.5-2M3.5 18l1 1 1.5-2"/></svg>',
    t_garden:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4c-8 0-14 5-14 12a6 6 0 0 0 12 0c1-5 1-8 2-12Z"/><path d="M7 21c0-6 3-10 8-13"/></svg>',
    t_comm:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 6.2a3 3 0 0 1 0 5.6M18.5 20a5.5 5.5 0 0 0-3-4.9"/></svg>',
    t_profile:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4.5 20a7.5 7.5 0 0 1 15 0"/></svg>'
  };
  const COVERS=['radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.22),transparent 60%),linear-gradient(150deg,#3a8c66,#1f5a40)',
    'radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.22),transparent 60%),linear-gradient(150deg,#5bb389,#2c6e51)',
    'radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.2),transparent 60%),linear-gradient(150deg,#2c694e,#15382a)',
    'radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.24),transparent 60%),linear-gradient(150deg,#79c6a0,#3a8c66)',
    'radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.2),transparent 60%),linear-gradient(150deg,#48876a,#23503c)',
    'radial-gradient(80% 60% at 70% 20%,rgba(255,255,255,.24),transparent 60%),linear-gradient(150deg,#8fd0b2,#4daf82)'];
  // status: warn (needs water) / ok (water in Nd) / good (healthy)
  const GROUPS=[
    {space:'Living Room',place:'Indoor',plants:[
      {nm:'Fiddle',sp:'Ficus lyrata',s:'ok',t:'Water in 2d'},
      {nm:'Mara',sp:'Monstera deliciosa',s:'warn',t:'Needs water'},
      {nm:'Pancake',sp:'Pilea peperomioides',s:'good',t:'Healthy'}]},
    {space:'Balcony',place:'Outdoor',plants:[
      {nm:'Rosemary',sp:'Salvia rosmarinus',s:'ok',t:'Water in 4d'},
      {nm:'Basil',sp:'Ocimum basilicum',s:'warn',t:'Needs water'}]},
    {space:'Office',place:'Indoor',plants:[
      {nm:'Zee',sp:'Zamioculcas zamiifolia',s:'good',t:'Healthy'},
      {nm:'Snake',sp:'Dracaena trifasciata',s:'ok',t:'Water in 6d'}]}
  ];
  const TABS=[['t_today','Today'],['t_garden','Garden'],['t_comm','Community'],['t_profile','Profile']];

  let ci=0;
  function pcard(p){
    const cov=COVERS[ci++%COVERS.length];
    const sIc=p.s==='warn'?I.sdotWarn:p.s==='good'?I.sdotGood:I.droplet;
    const stIc=p.s==='good'?I.leaf:I.droplet;
    return `<div class="pcard" tabindex="0">
      <div class="cover" style="background:${cov}"><span class="ph">${I.photo}</span><span class="sdot ${p.s}">${sIc}</span></div>
      <div class="pbody"><div class="nm">${p.nm}</div><div class="sp">${p.sp}</div>
        <div class="st ${p.s}">${stIc}${p.t}</div></div></div>`;
  }
  function groupHTML(g){
    return `<div class="grp" data-place="${g.place}">
      <div class="grp-hd"><b>${g.space}</b><span class="pl">${g.place}</span><span class="ct">${g.plants.length}</span></div>
      <div class="pgrid">${g.plants.map(pcard).join('')}</div></div>`;
  }

  function appHTML(){
    ci=0;
    const tabs=TABS.map(t=>`<button class="tab" aria-selected="${t[1]==='Garden'}">${I[t[0]]}<span>${t[1]}</span></button>`).join('');
    return `
    <div class="ghd">
      <div class="ghd-row">
        <button class="switcher">Home <span class="chev">${I.chev}</span></button>
        <div class="ghd-actions">
          <button class="iconbtn" aria-label="Search">${I.search}</button>
          <button class="iconbtn bell" aria-label="Notifications">${I.bell}<span class="badge"></span></button>
        </div>
      </div>
      <div class="ghd-sub"><span class="sun">${I.sun}</span>Lisbon · 19° clear · 7 plants</div>
    </div>
    <div class="chips" role="group" aria-label="Filter by Place">
      <button class="chip" aria-pressed="true" data-f="All">All</button>
      <button class="chip" aria-pressed="false" data-f="Indoor">Indoor</button>
      <button class="chip" aria-pressed="false" data-f="Outdoor">Outdoor</button>
      <button class="chip" aria-pressed="false" data-f="Greenhouse">Greenhouse</button>
    </div>
    <div class="content">
      ${GROUPS.map(groupHTML).join('')}
      <div class="empty" data-empty hidden>${I.house}<b>Nothing here yet</b><span>No plants in this Place — add one with the camera.</span></div>
      <button class="manage">${I.spaces} Manage Spaces</button>
    </div>
    <div class="scrim"></div>
    <div class="sheet" role="menu">
      <button data-a="identify"><span class="si">${I.scan}</span><span>Identify with camera<span class="st2">Snap a photo to name it</span></span></button>
      <button data-a="manual"><span class="si">${I.pencil}</span><span>Add manually<span class="st2">Search the Species yourself</span></span></button>
    </div>
    <div class="tabbar">
      <button class="tab" aria-selected="false">${I.t_today}<span>Today</span></button>
      <button class="tab" aria-selected="true">${I.t_garden}<span>Garden</span></button>
      <button class="tab spacer"><span>·</span><span>·</span></button>
      <button class="tab" aria-selected="false">${I.t_comm}<span>Community</span></button>
      <button class="tab" aria-selected="false">${I.t_profile}<span>Profile</span></button>
      <button class="fab" aria-label="Add a plant">${I.camera}</button>
    </div>`;
  }

  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());

  function setup(root){
    const chips=Array.from(root.querySelectorAll('.chip')),groups=Array.from(root.querySelectorAll('.grp')),
          empty=root.querySelector('[data-empty]'),fab=root.querySelector('.fab'),
          sheet=root.querySelector('.sheet'),scrim=root.querySelector('.scrim'),content=root.querySelector('.content'),
          tabs=Array.from(root.querySelectorAll('.tabbar .tab:not(.spacer)'));
    function filter(f){
      let shown=0;
      groups.forEach(g=>{const on=f==='All'||g.dataset.place===f;g.hidden=!on;if(on)shown++;});
      empty.hidden=shown>0;
      if(!REDUCE)gsap.fromTo(groups.filter(g=>!g.hidden),{opacity:0,y:10},{opacity:1,y:0,duration:.38,stagger:.05,ease:'power3.out'});
    }
    chips.forEach(c=>c.addEventListener('click',()=>{chips.forEach(x=>x.setAttribute('aria-pressed','false'));c.setAttribute('aria-pressed','true');filter(c.dataset.f);}));
    function closeSheet(){sheet.classList.remove('open');scrim.classList.remove('open');}
    fab.addEventListener('click',()=>{const o=sheet.classList.contains('open');o?closeSheet():(sheet.classList.add('open'),scrim.classList.add('open'));});
    scrim.addEventListener('click',closeSheet);
    sheet.querySelectorAll('button').forEach(b=>b.addEventListener('click',closeSheet));
    tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.setAttribute('aria-selected','false'));t.setAttribute('aria-selected','true');}));
    root.querySelectorAll('.pcard,.iconbtn,.switcher,.manage').forEach(el=>el.addEventListener('click',()=>{}));
  }

  function animateIn(root){
    const seq=[root.querySelector('.ghd'),root.querySelector('.chips'),...root.querySelectorAll('.content .grp:not([hidden]) , .content .manage')];
    const cards=root.querySelectorAll('.pcard');
    if(REDUCE){gsap.set([seq,cards,root.querySelector('.tabbar')],{opacity:1,y:0});return;}
    gsap.set(root.querySelector('.tabbar'),{y:80,opacity:0});
    gsap.set([root.querySelector('.ghd'),root.querySelector('.chips')],{opacity:0,y:-10});
    gsap.set(cards,{opacity:0,y:18});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .to([root.querySelector('.ghd'),root.querySelector('.chips')],{opacity:1,y:0,duration:.5,stagger:.08})
      .to(cards,{opacity:1,y:0,duration:.5,stagger:.05},'-=0.2')
      .to(root.querySelector('.tabbar'),{y:0,opacity:1,duration:.55,ease:'back.out(1.4)'},'-=0.4');
  }

  roots.forEach(setup);
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.tabbar')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
