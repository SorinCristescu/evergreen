
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--danger:#b3402f;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --bubble-me:rgba(46,109,78,.15);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}

  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}

  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}

  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:60;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:60;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.4)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:60;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:60;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.34)}

  .statusbar{position:absolute;z-index:55;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);pointer-events:none}
  .pixel .statusbar{padding-top:15px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}

  .app{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}

  /* chat header */
  .chead{flex:none;padding:50px 12px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(22,39,30,.07)}
  .pixel .chead{padding-top:44px}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-700);flex:none;-webkit-tap-highlight-color:transparent}
  .iconbtn:active{box-shadow:var(--neu-pressed)}
  .ch-av{position:relative;width:38px;height:38px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:13px;color:#fff;background:linear-gradient(150deg,#c76b4f,#9a4733)}
  .ch-av .on{position:absolute;right:-1px;bottom:-1px;width:11px;height:11px;border-radius:50%;background:var(--ever-400);box-shadow:0 0 0 2.5px var(--ever-100)}
  .ch-id{flex:1;min-width:0}
  .ch-id b{display:block;font-family:var(--font-display);font-weight:600;font-size:15px;color:var(--ever-900);letter-spacing:-.01em}
  .ch-id span{font-size:11px;color:var(--leaf);font-weight:500}

  /* context card */
  .ctx{flex:none;margin:10px 14px 0;display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:13px;background:var(--ever-100);box-shadow:var(--neu-raised-sm);cursor:pointer}
  .ctx .ci{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);background:linear-gradient(150deg,#79c6a0,#3a8c66)}
  .ctx .cx{flex:1;min-width:0}
  .ctx .cx b{display:block;font-family:var(--font-display);font-weight:600;font-size:12.5px;color:var(--ever-900)}
  .ctx .cx span{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ever-500)}
  .ctx .cv{color:var(--fg-subtle);flex:none}

  /* messages */
  .msgs{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:8px;scrollbar-width:none}
  .msgs::-webkit-scrollbar{display:none}
  .daysep{align-self:center;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-subtle);margin:4px 0 6px}
  .bub{max-width:78%;padding:9px 13px;font-size:13px;line-height:1.42;border-radius:16px;position:relative}
  .bub.them{align-self:flex-start;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--fg);border-bottom-left-radius:6px}
  .bub.me{align-self:flex-end;background:var(--bubble-me);color:var(--ever-900);border-bottom-right-radius:6px}
  .bub .t{display:block;font-family:var(--font-mono);font-size:9px;color:var(--fg-subtle);margin-top:4px;text-align:right}
  .bub.them .t{text-align:left}
  .receipt{align-self:flex-end;font-family:var(--font-mono);font-size:9.5px;color:var(--fg-subtle);margin:-2px 4px 4px;display:flex;align-items:center;gap:4px}
  .receipt svg{color:var(--ever-500)}
  .typing{align-self:flex-start;display:none;align-items:center;gap:4px;padding:11px 14px;border-radius:16px;border-bottom-left-radius:6px;background:var(--ever-100);box-shadow:var(--neu-raised-sm)}
  .typing.show{display:flex}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--fg-subtle);animation:td 1.1s ease-in-out infinite}
  .typing i:nth-child(2){animation-delay:.16s}.typing i:nth-child(3){animation-delay:.32s}
  @keyframes td{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

  /* composer */
  .composer{flex:none;display:flex;align-items:center;gap:9px;padding:10px 12px calc(12px + env(safe-area-inset-bottom));border-top:1px solid rgba(22,39,30,.07)}
  .pixel .composer{padding-bottom:14px}
  .cplus{width:38px;height:38px;border-radius:50%;border:0;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-500)}
  .cplus:active{box-shadow:var(--neu-pressed)}
  .cfield{flex:1;display:flex;align-items:center;min-height:40px;padding:0 14px;border-radius:20px;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .cfield input{flex:1;border:0;outline:0;background:transparent;font-family:var(--font-body);font-size:14px;color:var(--fg);min-width:0}
  .cfield input::placeholder{color:var(--fg-subtle)}
  .csend{width:40px;height:40px;border-radius:50%;border:0;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-500);transition:opacity .2s,box-shadow .14s}
  .csend:active{box-shadow:var(--neu-pressed)}
  .csend[disabled]{opacity:.4;cursor:not-allowed}

  /* sheet */
  .scrim{position:absolute;inset:0;z-index:57;background:rgba(11,24,18,.22);opacity:0;pointer-events:none;transition:opacity .22s}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;z-index:58;left:12px;right:12px;bottom:14px;border-radius:20px;background:var(--ever-100);box-shadow:var(--neu-raised);padding:8px;opacity:0;transform:translateY(14px);pointer-events:none;transition:opacity .22s,transform .22s}
  .sheet.open{opacity:1;transform:translateY(0);pointer-events:auto}
  .sheet button{width:100%;display:flex;align-items:center;gap:13px;padding:13px;border:0;background:transparent;border-radius:12px;cursor:pointer;text-align:left;font-family:var(--font-body);font-size:14.5px;font-weight:500;color:var(--fg)}
  .sheet button:hover{background:var(--accent-tint)}
  .sheet button.danger{color:var(--danger)}
  .sheet button .mi{width:34px;height:34px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-pressed);color:var(--ever-500)}
  .sheet button.danger .mi{color:var(--danger)}

  /* swap listing preview sheet */
  .lsheet{position:absolute;z-index:59;left:0;right:0;bottom:0;border-radius:24px 24px 0 0;background:var(--ever-100);box-shadow:0 -16px 40px rgba(0,0,0,.28);padding:10px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .34s cubic-bezier(.16,1,.3,1)}
  .pixel .lsheet{padding-bottom:24px}
  .lsheet.open{transform:translateY(0)}
  .lhandle{width:40px;height:5px;border-radius:3px;background:rgba(22,39,30,.18);margin:4px auto 14px}
  .lphoto{position:relative;height:120px;border-radius:16px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);background:linear-gradient(150deg,#79c6a0,#3a8c66);margin-bottom:13px}
  .lphoto .ltag{position:absolute;left:11px;top:11px;font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ever-700);background:rgba(255,255,255,.9);padding:3px 9px;border-radius:999px}
  .ltitle{font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--ever-900);letter-spacing:-.02em}
  .loffer{margin-top:11px;display:flex;flex-direction:column;gap:9px}
  .loffer .lrow{display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.4;color:var(--fg)}
  .loffer .lrow .ll{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-subtle);width:54px;flex:none;padding-top:3px}
  .lowner{display:flex;align-items:center;gap:10px;margin:14px 0;padding:11px 12px;border-radius:13px;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .lowner .oav{width:34px;height:34px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:600;font-size:12px;color:#fff;background:linear-gradient(150deg,#c76b4f,#9a4733)}
  .lowner .ox{flex:1;min-width:0}
  .lowner .ox b{display:block;font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ever-900)}
  .lowner .ox span{font-family:var(--font-mono);font-size:10px;color:var(--fg-subtle)}
  .lview{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;height:50px;border:0;cursor:pointer;border-radius:15px;background:var(--ever-100);box-shadow:var(--neu-raised);font-family:var(--font-body);font-weight:600;font-size:15px;color:var(--ever-700)}
  .lview:active{box-shadow:var(--neu-pressed)}
  .lview .arr{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-tint);color:var(--ever-500)}

  .toast{position:absolute;z-index:62;left:18px;right:18px;bottom:80px;display:flex;align-items:center;gap:10px;padding:12px 15px;border-radius:14px;background:var(--ever-900);color:#eaf3ed;font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .toast.show{opacity:1;transform:translateY(0)}
  .toast svg{color:var(--ever-400);flex:none}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}

  @media (max-width:740px){
    .iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}
    .pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>

<script>
(function(){

  const I={

    {s:'me',t:'Yep — Alfama. Could do a swap this weekend?',time:'9:24'},
    {s:'them',t:'Let’s do it. I’ll bring the pups to the plant market around 10am Saturday.',time:'9:30'},
    {s:'me',t:'Sounds great — see you there!',time:'9:32',read:true}
  ];
  const REPLIES=['Can’t wait — they’re really thriving right now.','I’ll bring a little box for your cutting too.','Perfect. I’ll message if anything changes.','See you Saturday! 🌿'.replace(' 🌿','')];

  function bubble(m){
    return `<div class="bub ${m.s}">${m.t}<span class="t">${m.time}</span></div>`;
  }
  function appHTML(){
    return `
    <div class="chead">
      <button class="iconbtn back" aria-label="Back">${I.back}</button>
      <span class="ch-av">LD<span class="on"></span></span>
      <span class="ch-id"><b>@leaf.lydia</b><span>Active now</span></span>
      <button class="iconbtn more" aria-label="More">${I.more}</button>
    </div>
    <div class="ctx"><span class="ci">${I.leaf}</span><span class="cx"><span>Swap listing</span><b>Pilea pups ×3</b></span><span class="cv">${I.chev}</span></div>
    <div class="msgs">
      <div class="daysep">Today</div>
      ${MSGS.map(bubble).join('')}
      <div class="receipt">${I.seen} Read 9:32</div>
      <div class="typing"><i></i><i></i><i></i></div>
    </div>
    <div class="composer">
      <button class="cplus" aria-label="Attach">${I.plus}</button>
      <label class="cfield"><input type="text" placeholder="Message…" aria-label="Message"></label>
      <button class="csend" aria-label="Send" disabled>${I.send}</button>
    </div>
    <div class="scrim"></div>
    <div class="sheet" role="menu">
      <button>${'<span class="mi">'+I.mute+'</span>'}Mute notifications</button>
      <button class="danger">${'<span class="mi">'+I.flag+'</span>'}Report conversation</button>
      <button class="danger">${'<span class="mi">'+I.block+'</span>'}Block @leaf.lydia</button>
    </div>
    <div class="lsheet">
      <div class="lhandle"></div>
      <div class="lphoto"><span class="ltag">Offering</span>${I.leaf}</div>
      <div class="ltitle">Pilea pups ×3</div>
      <div class="loffer">
        <div class="lrow"><span class="ll">Offering</span><span>3 rooted <i>Pilea peperomioides</i> pups, ~8cm</span></div>
        <div class="lrow"><span class="ll">Seeking</span><span>Any trailing pothos cutting</span></div>
        <div class="lrow"><span class="ll">Pickup</span><span>Local · Lisbon plant market</span></div>
      </div>
      <div class="lowner"><span class="oav">LD</span><span class="ox"><b>@leaf.lydia</b><span>Posted 2 days ago · 4.9★ swapper</span></span></div>
      <button class="lview">View full listing <span class="arr"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg></span></button>
    </div>
    <div class="toast"><span class="tic">${I.check}</span><span class="tmsg"></span></div>`;
  }

  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());

  let replyIdx=0;
  function setup(root){
    const msgs=root.querySelector('.msgs'),input=root.querySelector('.cfield input'),send=root.querySelector('.csend'),
          typing=root.querySelector('.typing'),receipt=root.querySelector('.receipt'),
          sheet=root.querySelector('.sheet'),scrim=root.querySelector('.scrim'),toast=root.querySelector('.toast'),tmsg=root.querySelector('.tmsg');
    function scroll(){msgs.scrollTop=msgs.scrollHeight;}
    function showToast(m){tmsg.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2400);}

    input.addEventListener('input',()=>{send.disabled=input.value.trim().length===0;});
    function addBub(side,text){
      const el=document.createElement('div');el.className='bub '+side;el.innerHTML=text+'<span class="t">now</span>';
      msgs.insertBefore(el,typing);
      if(!REDUCE)gsap.fromTo(el,{opacity:0,y:10,scale:.96},{opacity:1,y:0,scale:1,duration:.32,ease:'back.out(1.6)'});
      scroll();return el;
    }
    function sendMsg(){
      const v=input.value.trim();if(!v)return;
      receipt.style.display='none';
      addBub('me',v);input.value='';send.disabled=true;
      setTimeout(()=>{typing.classList.add('show');scroll();
        setTimeout(()=>{typing.classList.remove('show');
          addBub('them',REPLIES[replyIdx++%REPLIES.length]);
        },1200);
      },500);
    }
    send.addEventListener('click',sendMsg);
    input.addEventListener('keydown',e=>{if(e.key==='Enter')sendMsg();});
    root.querySelector('.cplus').addEventListener('click',()=>{});

    const lsheet=root.querySelector('.lsheet');
    const close=()=>{sheet.classList.remove('open');lsheet.classList.remove('open');scrim.classList.remove('open');};
    root.querySelector('.more').addEventListener('click',()=>{sheet.classList.add('open');scrim.classList.add('open');});
    scrim.addEventListener('click',close);
    sheet.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
      if(b.textContent.trim().startsWith('Report')){window.location='evergreen-report.html';return;}
      close();showToast(b.textContent.trim());}));
    root.querySelector('.ctx').addEventListener('click',()=>{lsheet.classList.add('open');scrim.classList.add('open');});
    root.querySelector('.lview').addEventListener('click',()=>{close();showToast('Opening the full Swap listing…');});
    root.querySelector('.back').addEventListener('click',()=>{});
    requestAnimationFrame(scroll);
  }

  function animateIn(root){
    const head=root.querySelector('.chead'),ctx=root.querySelector('.ctx'),bubs=root.querySelectorAll('.msgs .bub, .msgs .receipt'),comp=root.querySelector('.composer');
    root.querySelector('.msgs').scrollTop=root.querySelector('.msgs').scrollHeight;
    if(REDUCE){gsap.set([head,ctx,bubs,comp],{opacity:1,y:0});return;}
    gsap.set([head,ctx],{opacity:0,y:-8});gsap.set(bubs,{opacity:0,y:12});gsap.set(comp,{opacity:0,y:20});
    gsap.timeline({defaults:{ease:'power3.out'}})
      .to([head,ctx],{opacity:1,y:0,duration:.45,stagger:.08})
      .to(bubs,{opacity:1,y:0,duration:.4,stagger:.05},'-=0.15')
      .to(comp,{opacity:1,y:0,duration:.45},'-=0.2')
      .add(()=>{const m=root.querySelector('.msgs');m.scrollTop=m.scrollHeight;});
  }

  roots.forEach(setup);
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.composer')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
