
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Splash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  /* ===== Evergreen tokens (active design system) ===== */
  :root{
    --bg:#0c1f17;            /* Evergreen-900 — splash dark canvas */
    --ever-400:#4daf82;
    --ever-500:#2c694e;
    --ever-700:#1b4332;
    --ever-900:#0c1f17;
    --leaf:#3e7c4f;
    --paper:#f1f7f3;
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;
    --hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font-body);
    /* studio backdrop — deep forest, lets the dark phones float */
    background:
      radial-gradient(120% 80% at 50% -10%, #16302280 0%, transparent 55%),
      radial-gradient(100% 100% at 50% 120%, #0b1812 0%, #060b08 100%);
    color:var(--paper);
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(28px,5vh,56px);
    padding:48px 24px 120px;
    overflow-x:hidden;
  }
  /* faint vignette + grain feel */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:radial-gradient(80% 60% at 50% 40%, transparent 60%, rgba(0,0,0,.45) 100%);
    z-index:0;
  }

  /* ===== studio header ===== */
  .studio-head{
    position:relative;z-index:2;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:10px;
  }
  .studio-head .kicker{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.34em;
    text-transform:uppercase;color:#6fa489;
  }
  .studio-head h1{
    font-family:var(--font-display);font-weight:600;font-size:clamp(20px,3.4vw,30px);
    letter-spacing:-.02em;color:#dcebe2;
  }
  .studio-head h1 b{color:var(--ever-400);font-weight:600}

  /* ===== device gallery ===== */
  .gallery{
    position:relative;z-index:2;
    display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;
    gap:clamp(32px,6vw,72px);
  }
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:#5c8772;
  }

  /* ---- shared phone shell ---- */
  .phone{
    position:relative;
    background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);
    box-shadow:
      0 2px 0 1px rgba(255,255,255,.05) inset,
      0 60px 90px -40px rgba(0,0,0,.85),
      0 0 0 1px rgba(0,0,0,.6),
      0 0 70px -10px rgba(46,109,78,.35);
  }
  .screen{
    position:relative;overflow:hidden;
    width:300px;height:650px;
    background:
      radial-gradient(130% 90% at 50% 38%, #123325 0%, var(--bg) 52%, #081710 100%);
  }
  .screen *{position:relative}

  /* iPhone 15 Pro */
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}
  .iphone .screen{border-radius:48px}
  .iphone .island{
    position:absolute;z-index:30;top:20px;left:50%;transform:translateX(-50%);
    width:88px;height:27px;border-radius:16px;background:#000;
    box-shadow:0 0 0 1px rgba(255,255,255,.04);
  }
  .iphone .island::after{
    content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#26343b,#05070a);
  }
  .iphone .home-ind{
    position:absolute;z-index:30;bottom:9px;left:50%;transform:translateX(-50%);
    width:120px;height:5px;border-radius:3px;background:rgba(241,247,243,.55);
  }

  /* Pixel 8 Pro */
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;
    background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e);}
  .pixel .screen{border-radius:27px}
  .pixel .punch{
    position:absolute;z-index:30;top:15px;left:50%;transform:translateX(-50%);
    width:13px;height:13px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#23323a,#04060a);
    box-shadow:0 0 0 2px rgba(0,0,0,.5);
  }
  .pixel .nav-pill{
    position:absolute;z-index:30;bottom:10px;left:50%;transform:translateX(-50%);
    width:96px;height:5px;border-radius:3px;background:rgba(241,247,243,.4);
  }

  /* ---- status bar ---- */
  .statusbar{
    position:absolute;z-index:25;top:0;left:0;right:0;height:54px;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 26px 0;
    font-family:var(--font-mono);font-size:12.5px;letter-spacing:.02em;
    color:rgba(241,247,243,.82);
  }
  .pixel .statusbar{padding-top:16px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}
  .statusbar svg{display:block;opacity:.85}

  /* ---- logo stage ---- */
  .stage{
    position:absolute;inset:0;z-index:10;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:30px;
  }
  .logo-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:26px}
  .markbox{position:relative;width:168px;height:168px}
  .halo{
    position:absolute;inset:-46%;border-radius:50%;
    background:radial-gradient(circle,rgba(77,175,130,.42) 0%,rgba(46,109,78,.18) 42%,transparent 66%);
    filter:blur(14px);opacity:0;will-change:transform,opacity;
  }
  .mark{position:relative;width:100%;height:100%;display:block;overflow:visible}
  .petal{will-change:transform,opacity}

  .wordtag{display:flex;flex-direction:column;align-items:center;gap:11px}
  .wordmark{
    font-family:var(--font-display);font-weight:600;font-size:38px;line-height:1;
    letter-spacing:-.03em;text-transform:lowercase;opacity:0;will-change:transform,opacity;
  }
  .wordmark .ever{color:var(--paper)}
  .wordmark .green{color:var(--ever-400)}
  .tagline{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.26em;text-transform:uppercase;
    color:#7fae93;opacity:0;will-change:transform,opacity;
  }

  /* ---- loader ---- */
  .loader{
    position:absolute;z-index:10;bottom:64px;left:50%;transform:translateX(-50%);
    display:flex;gap:7px;opacity:0;
  }
  .loader span{
    width:6px;height:6px;border-radius:50%;background:var(--ever-400);
    animation:dot 1.1s ease-in-out infinite;
  }
  .loader span:nth-child(2){animation-delay:.16s}
  .loader span:nth-child(3){animation-delay:.32s}
  @keyframes dot{0%,100%{opacity:.28;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

  /* ===== replay control (studio chrome) ===== */
  .replay{
    position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);
    display:inline-flex;align-items:center;gap:10px;
    min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;
    font-family:var(--font-body);font-weight:500;font-size:14px;letter-spacing:.01em;
    color:#e7f2ec;
    background:linear-gradient(180deg,#16322376,#0e241a8a);
    border:1px solid rgba(120,180,150,.28);
    box-shadow:0 10px 30px -12px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.03) inset;
    transition:transform .18s cubic-bezier(.16,1,.3,1),border-color .18s,box-shadow .18s;
    -webkit-tap-highlight-color:transparent;
  }
  .replay:hover{transform:translateX(-50%) translateY(-2px);border-color:rgba(120,180,150,.5);
    box-shadow:0 16px 38px -14px rgba(0,0,0,.75),0 0 24px -6px rgba(77,175,130,.4),0 0 0 1px rgba(255,255,255,.04) inset}
  .replay:active{transform:translateX(-50%) translateY(0)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-400)}
  .replay .accent{color:var(--ever-400)}

  /* responsive */
  @media (max-width:740px){
    .gallery{gap:40px}
    .iphone{width:288px;height:606px}
    .iphone .screen{width:270px;height:588px}
    .pixel{width:284px;height:604px}
    .pixel .screen{width:268px;height:588px}
  }
  @media (prefers-reduced-motion:reduce){
    .loader span{animation:none;opacity:.7}
  }
</style>
</head>
<body>

  <header class="studio-head">
    <span class="kicker">Evergreen · 01 Splash</span>
    <h1>Identify <b>·</b> Care <b>·</b> Diagnose <b>·</b> Connect</h1>
  </header>

  <div class="gallery">
    <!-- iPhone 15 Pro -->
    <div class="device">
      <div class="phone iphone">
        <div class="island"></div>
        <div class="screen" data-screen-label="01 Splash" data-od-id="splash-ios">
          <div class="statusbar">
            <span>9:41</span>
            <span class="icons">
              <!-- cellular -->
              <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg>
              <!-- wifi -->
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <!-- battery -->
              <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5" stroke-width="1"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg>
            </span>
          </div>
          <div class="stage">
            <div class="logo-wrap">
              <div class="markbox">
                <div class="halo"></div>
                <svg class="mark" viewBox="0 0 240 240" aria-label="Evergreen"></svg>
              </div>
              <div class="wordtag">
                <div class="wordmark"><span class="ever">ever</span><span class="green">green</span></div>
                <div class="tagline">grow something alive</div>
              </div>
            </div>
          </div>
          <div class="loader"><span></span><span></span><span></span></div>
          <div class="home-ind"></div>
        </div>
      </div>
      <span class="device-cap">iPhone 15 Pro</span>
    </div>

    <!-- Pixel 8 Pro -->
    <div class="device">
      <div class="phone pixel">
        <div class="punch"></div>
        <div class="screen" data-screen-label="01 Splash" data-od-id="splash-android">
          <div class="statusbar">
            <span>9:41</span>
            <span class="icons">
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg>
              <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg>
              <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg>
            </span>
          </div>
          <div class="stage">
            <div class="logo-wrap">
              <div class="markbox">
                <div class="halo"></div>
                <svg class="mark" viewBox="0 0 240 240" aria-label="Evergreen"></svg>
              </div>
              <div class="wordtag">
                <div class="wordmark"><span class="ever">ever</span><span class="green">green</span></div>
                <div class="tagline">grow something alive</div>
              </div>
            </div>
          </div>
          <div class="loader"><span></span><span></span><span></span></div>
          <div class="nav-pill"></div>
        </div>
      </div>
      <span class="device-cap">Pixel 8 Pro</span>
    </div>
  </div>

  <button class="replay" id="replay" aria-label="Replay animation">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>
    Replay <span class="accent">bloom</span>
  </button>

<script>
(function(){
  const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- 8-petal Evergreen mark, built from overlapping translucent ellipses ---
  // lightness sweeps top(deep) -> left(pale), recreating the brand two-tone bloom
  const PETALS = ['#2c694e','#377a5b','#46866a','#5fa17f','#7cbf9b','#9bd8b9','#a9dfc6','#8ed1b1'];
  function flowerSVG(){
    let p = '';
    for(let i=0;i<8;i++){
      p += `<ellipse class="petal" data-i="${i}" cx="120" cy="68" rx="32" ry="57"
              transform="rotate(${i*45} 120 120)" fill="${PETALS[i]}" fill-opacity="0.9"/>`;
    }
    return `
      <defs>
        <radialGradient id="heart" cx="40%" cy="36%" r="70%">
          <stop offset="0%" stop-color="#1d4a37"/>
          <stop offset="62%" stop-color="#0e2b1e"/>
          <stop offset="100%" stop-color="#071810"/>
        </radialGradient>
      </defs>
      <g class="flower">
        ${p}
        <circle class="heart" cx="120" cy="120" r="21" fill="url(#heart)"/>
        <circle class="heart-rim" cx="120" cy="120" r="21" fill="none" stroke="rgba(241,247,243,.10)" stroke-width="1"/>
        <ellipse class="heart-spec" cx="113" cy="113" rx="7" ry="5" fill="rgba(154,215,184,.32)"/>
      </g>`;
  }

  const roots = Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r => r.querySelector('.mark').innerHTML = flowerSVG());

  function resetState(root){
    gsap.killTweensOf(root.querySelectorAll('.halo,.flower,.petal,.heart,.heart-rim,.heart-spec,.wordmark,.tagline,.loader'));
    gsap.set(root.querySelector('.flower'), {rotation:0, svgOrigin:'120 120'});
  }

  function bloom(root){
    resetState(root);
    const petals = root.querySelectorAll('.petal');
    const hearts = root.querySelectorAll('.heart,.heart-rim,.heart-spec');

    if(REDUCE){
      gsap.set([root.querySelector('.halo'), petals, hearts, root.querySelector('.wordmark'), root.querySelector('.tagline'), root.querySelector('.loader')],
        {opacity:1, scale:1, clearProps:'transform,letterSpacing'});
      return;
    }

    // origin at the flower centre so everything blooms out of the middle
    gsap.set([petals, hearts], {svgOrigin:'120 120'});

    const tl = gsap.timeline({defaults:{ease:'power3.out'}});
    tl.fromTo(root.querySelector('.halo'),
        {scale:.25, opacity:0}, {scale:1, opacity:1, duration:1.0, ease:'power2.out'}, 0)
      // 1) the circle appears from the middle
      .fromTo(hearts,
        {scale:0, opacity:0}, {scale:1, opacity:1, duration:.7, ease:'back.out(2.4)'}, 0.12)
      // 2) then each petal staggers outward
      .fromTo(petals,
        {scale:0, opacity:0},
        {scale:1, opacity:.9, duration:.82, ease:'back.out(1.7)', stagger:{each:.085}}, '-=0.34')
      // 3) wordmark settles in
      .fromTo(root.querySelector('.wordmark'),
        {y:16, opacity:0, letterSpacing:'0.18em'},
        {y:0, opacity:1, letterSpacing:'-0.03em', duration:.7}, '-=0.18')
      .fromTo(root.querySelector('.tagline'),
        {y:8, opacity:0}, {y:0, opacity:1, duration:.55}, '-=0.34')
      .fromTo(root.querySelector('.loader'),
        {opacity:0}, {opacity:1, duration:.5}, '-=0.2')
      // 4) gentle living idle once bloomed
      .add(() => {
        gsap.to(root.querySelector('.flower'),
          {rotation:5, duration:6.5, svgOrigin:'120 120', ease:'sine.inOut', yoyo:true, repeat:-1});
        gsap.to(root.querySelector('.halo'),
          {scale:1.08, opacity:.82, duration:3.4, ease:'sine.inOut', yoyo:true, repeat:-1});
      });
    return tl;
  }

  function play(){ roots.forEach(bloom); }

  // initial paint hidden, then bloom
  gsap.set(roots.map(r=>r.querySelector('.halo')), {opacity:0});
  gsap.set(document.querySelectorAll('.petal,.heart,.heart-rim,.heart-spec,.wordmark,.tagline,.loader'), {opacity:0});
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(play); } else { play(); }
  setTimeout(()=>{ if(!document.querySelector('.wordmark').style.opacity){ play(); } }, 400);

  document.getElementById('replay').addEventListener('click', play);
})();
</script>
</body>
</html>
