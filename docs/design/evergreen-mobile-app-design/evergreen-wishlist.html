<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evergreen · Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@500,600,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root{
    --ever-100:#d8e9df;--ever-400:#4daf82;--ever-500:#2c694e;--ever-700:#1b4332;--ever-900:#0c1f17;
    --leaf:#3e7c4f;--terra:#c76b4f;--fg:#16271e;--fg-muted:#4b6357;--fg-subtle:#7d9488;--accent-tint:rgba(46,109,78,.12);
    --neu-raised:6px 6px 14px rgba(11,30,21,.13), -6px -6px 13px rgba(255,255,255,.80);
    --neu-raised-sm:4px 4px 9px rgba(11,30,21,.12), -4px -4px 9px rgba(255,255,255,.78);
    --neu-pressed:inset 4px 4px 9px rgba(11,30,21,.13), inset -4px -4px 9px rgba(255,255,255,.72);
    --font-display:'General Sans','Söhne',-apple-system,system-ui,sans-serif;
    --font-body:'Inter',-apple-system,system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Berkeley Mono',ui-monospace,monospace;--hit:44px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--font-body);color:var(--fg);background:radial-gradient(120% 80% at 50% -10%, #f1f7f3 0%, transparent 55%),radial-gradient(100% 100% at 50% 120%, #cfe2d7 0%, #e6f0ea 100%);min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(26px,5vh,52px);padding:48px 24px 120px;overflow-x:hidden}
  .studio-head{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:9px}
  .studio-head .kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:#5c8772}
  .studio-head h1{font-family:var(--font-display);font-weight:600;font-size:clamp(19px,3.2vw,28px);letter-spacing:-.02em;color:var(--ever-700)}
  .gallery{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:center;gap:clamp(32px,6vw,72px)}
  .device{display:flex;flex-direction:column;align-items:center;gap:18px}
  .device-cap{font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#5c8772}
  .phone{position:relative;background:linear-gradient(150deg,#2c2f30,#16191a 46%,#0a0c0c);box-shadow:0 2px 0 1px rgba(255,255,255,.05) inset,0 55px 80px -42px rgba(11,30,21,.5),0 0 0 1px rgba(0,0,0,.55)}
  .screen{position:relative;overflow:hidden;width:300px;height:650px;background:var(--ever-100)}
  .iphone{width:318px;height:668px;border-radius:56px;padding:9px}.iphone .screen{border-radius:48px}
  .iphone .island{position:absolute;z-index:60;top:18px;left:50%;transform:translateX(-50%);width:88px;height:27px;border-radius:16px;background:#0a0c0c}
  .iphone .island::after{content:"";position:absolute;right:11px;top:50%;transform:translateY(-50%);width:9px;height:9px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#26343b,#05070a)}
  .iphone .home-ind{position:absolute;z-index:60;bottom:9px;left:50%;transform:translateX(-50%);width:120px;height:5px;border-radius:3px;background:rgba(22,39,30,.4)}
  .pixel{width:312px;height:664px;border-radius:34px;padding:8px;background:linear-gradient(150deg,#3a3d3e,#1b1e1f 46%,#0c0e0e)}.pixel .screen{border-radius:27px}
  .pixel .punch{position:absolute;z-index:60;top:15px;left:50%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#23323a,#04060a);box-shadow:0 0 0 2px rgba(255,255,255,.12)}
  .pixel .nav-pill{position:absolute;z-index:60;bottom:10px;left:50%;transform:translateX(-50%);width:96px;height:5px;border-radius:3px;background:rgba(22,39,30,.34)}
  .statusbar{position:absolute;z-index:55;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:18px 26px 0;font-family:var(--font-mono);font-size:12.5px;color:var(--fg);pointer-events:none}
  .pixel .statusbar{padding-top:15px}
  .statusbar .icons{display:flex;align-items:center;gap:6px}.statusbar svg{display:block}
  .app{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column}

  .hd{flex:none;padding:50px 12px 4px;display:flex;align-items:center;gap:8px}
  .pixel .hd{padding-top:44px}
  .iconbtn{width:38px;height:38px;border-radius:50%;border:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:var(--ever-100);box-shadow:var(--neu-raised-sm);color:var(--ever-700);flex:none;-webkit-tap-highlight-color:transparent}
  .iconbtn:active{box-shadow:var(--neu-pressed)}
  .hd h2{flex:1;font-family:var(--font-display);font-weight:600;font-size:19px;color:var(--ever-900);letter-spacing:-.02em}
  .hd .ct{font-family:var(--font-mono);font-size:11px;color:var(--fg-subtle);padding-right:10px}

  .search{flex:none;margin:8px 16px 4px;display:flex;align-items:center;gap:10px;height:44px;padding:0 14px;border-radius:14px;background:var(--ever-100);box-shadow:var(--neu-pressed)}
  .search .ic{display:flex;color:var(--ever-500);flex:none}
  .search input{flex:1;border:0;outline:0;background:transparent;font-family:var(--font-body);font-size:14px;color:var(--fg);min-width:0}
  .search input::placeholder{color:var(--fg-subtle)}

  .content{flex:1;overflow-y:auto;padding:10px 16px 26px;scrollbar-width:none}
  .content::-webkit-scrollbar{display:none}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .wcard{position:relative;border-radius:16px;background:var(--ever-100);box-shadow:var(--neu-raised);overflow:hidden;display:flex;flex-direction:column}
  .wcard .wc{height:92px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45)}
  .wheart{position:absolute;top:9px;right:9px;width:28px;height:28px;border:0;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.92);color:var(--terra);box-shadow:0 1px 3px rgba(0,0,0,.18)}
  .wheart .o{display:none}.wheart[aria-pressed=false]{color:var(--fg-subtle)}
  .wb{flex:1;display:flex;flex-direction:column;padding:10px 11px 12px}
  .wb b{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--ever-900);letter-spacing:-.01em}
  .wb .sp{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-subtle);margin-top:2px}
  .wb .tag{align-self:flex-start;margin-top:8px;font-size:9.5px;font-weight:600;color:var(--ever-500);background:var(--accent-tint);padding:2px 8px;border-radius:999px}
  .wcard.removed{opacity:.45}
  .wcard.removed .wheart{color:var(--fg-subtle)}

  .replay{position:fixed;z-index:50;bottom:34px;left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:10px;min-height:var(--hit);padding:0 22px;border-radius:999px;cursor:pointer;font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--ever-700);background:var(--ever-100);box-shadow:var(--neu-raised);border:0;transition:transform .16s,box-shadow .16s}
  .replay:hover{transform:translateX(-50%) translateY(-2px)}.replay:active{transform:translateX(-50%);box-shadow:var(--neu-pressed)}
  .replay svg{width:17px;height:17px;stroke:var(--ever-500)}
  @media (max-width:740px){.iphone{width:290px;height:610px}.iphone .screen{width:272px;height:592px}.pixel{width:286px;height:608px}.pixel .screen{width:270px;height:592px}}
  @media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important}}
</style>
</head>
<body>
  <header class="studio-head"><span class="kicker">Evergreen · 19 Wishlist</span><h1>Species you’re hoping to grow next</h1></header>
  <div class="gallery">
    <div class="device"><div class="phone iphone"><div class="island"></div>
      <div class="screen" data-screen-label="19 Wishlist" data-od-id="wishlist-ios"><div class="statusbar"><span>9:41</span><span class="icons"><svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor" opacity=".4"/></svg><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.6 9.4 9c-.8-.7-2-.7-2.8 0L8 10.6Z" fill="currentColor"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".7" y=".7" width="22" height="10.6" rx="3" stroke="currentColor" stroke-opacity=".5"/><rect x="2.4" y="2.4" width="15" height="7.2" rx="1.6" fill="currentColor"/><rect x="24" y="4" width="1.6" height="4" rx=".8" fill="currentColor" opacity=".5"/></svg></span></div><div class="app"></div><div class="home-ind"></div></div></div><span class="device-cap">iPhone 15 Pro</span></div>
    <div class="device"><div class="phone pixel"><div class="punch"></div>
      <div class="screen" data-screen-label="19 Wishlist" data-od-id="wishlist-android"><div class="statusbar"><span>9:41</span><span class="icons"><svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M2.2 3.6c3.2-3 8.4-3 11.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M4.6 6.2C6.5 4.4 9.5 4.4 11.4 6.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="9.6" r="1.3" fill="currentColor"/></svg><svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="5" y="4.5" width="3" height="7.5" rx="1" fill="currentColor"/><rect x="10" y="2" width="3" height="10" rx="1" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="1" fill="currentColor"/></svg><svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x=".7" y="1.4" width="20" height="9.2" rx="2.4" stroke="currentColor" stroke-opacity=".5"/><rect x="2.2" y="2.9" width="14" height="6.2" rx="1.2" fill="currentColor"/><rect x="21.6" y="4.2" width="1.6" height="3.6" rx=".8" fill="currentColor" opacity=".5"/></svg></span></div><div class="app"></div><div class="nav-pill"></div></div></div><span class="device-cap">Pixel 8 Pro</span></div>
  </div>
  <button class="replay" id="replay" aria-label="Replay"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v4h4"/></svg>Replay</button>
<script>
(function(){
  const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const I={
    back:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>',
    search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>',
    heartF:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 20s-7-4.4-9.2-8.2A4.6 4.6 0 0 1 12 6.5a4.6 4.6 0 0 1 9.2 5.3C19 15.6 12 20 12 20Z"/></svg>',
    heartO:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-7-4.4-9.2-8.2A4.6 4.6 0 0 1 12 6.5a4.6 4.6 0 0 1 9.2 5.3C19 15.6 12 20 12 20Z"/></svg>',
    leaf:'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4c-8 0-14 5-14 12a6 6 0 0 0 12 0c1-5 1-8 2-12Z"/><path d="M7 21c0-6 3-10 8-13"/></svg>'
  };
  const COV=['linear-gradient(150deg,#3a8c66,#1c4d39)','linear-gradient(150deg,#79c6a0,#3a8c66)','linear-gradient(150deg,#2c694e,#15382a)','linear-gradient(150deg,#5bb389,#2c6e51)','linear-gradient(150deg,#48876a,#23503c)','linear-gradient(150deg,#8fd0b2,#4daf82)'];
  const W=[
    {nm:'Swiss cheese vine',sp:'Monstera adansonii',tag:'Easy care'},
    {nm:'String of pearls',sp:'Curio rowleyanus',tag:'Bright light'},
    {nm:'Bird of paradise',sp:'Strelitzia nicolai',tag:'Statement'},
    {nm:'Calathea orbifolia',sp:'Goeppertia orbifolia',tag:'Loves humidity'},
    {nm:'ZZ Raven',sp:'Zamioculcas “Raven”',tag:'Low light'},
    {nm:'Wax plant',sp:'Hoya carnosa',tag:'Trailing'}
  ];
  function card(w,i){return `<div class="wcard"><div class="wc" style="background:${COV[i%COV.length]}">${I.leaf}</div>
    <button class="wheart" aria-pressed="true" aria-label="Toggle wishlist"></button>
    <div class="wb"><b>${w.nm}</b><span class="sp">${w.sp}</span><span class="tag">${w.tag}</span></div></div>`;}
  function appHTML(){return `
    <div class="hd"><button class="iconbtn back">${I.back}</button><h2>Wishlist</h2><span class="ct">${W.length} saved</span></div>
    <label class="search"><span class="ic">${I.search}</span><input type="text" placeholder="Search Species to add…"></label>
    <div class="content"><div class="grid">${W.map(card).join('')}</div></div>`;}
  const roots=Array.from(document.querySelectorAll('.screen'));
  roots.forEach(r=>r.querySelector('.app').innerHTML=appHTML());
  function setup(root){
    const ct=root.querySelector('.ct');
    function recount(){ct.textContent=root.querySelectorAll('.wheart[aria-pressed=true]').length+' saved';}
    root.querySelectorAll('.wheart').forEach(h=>{h.innerHTML=I.heartF;h.addEventListener('click',()=>{
      const on=h.getAttribute('aria-pressed')==='true';h.setAttribute('aria-pressed',!on);
      h.innerHTML=on?I.heartO:I.heartF;h.closest('.wcard').classList.toggle('removed',on);
      if(!on&&!REDUCE)gsap.fromTo(h,{scale:.5},{scale:1,duration:.34,ease:'back.out(2.6)'});recount();});});
    root.querySelector('.back').addEventListener('click',()=>{});
  }
  roots.forEach(setup);
  function animateIn(root){const hd=root.querySelector('.hd'),sb=root.querySelector('.search'),cards=root.querySelectorAll('.wcard');
    if(REDUCE){gsap.set([hd,sb,cards],{opacity:1,y:0});return;}
    gsap.set([hd,sb],{opacity:0,y:-8});gsap.set(cards,{opacity:0,y:16});
    gsap.timeline({defaults:{ease:'power3.out'}}).to([hd,sb],{opacity:1,y:0,duration:.45,stagger:.07}).to(cards,{opacity:1,y:0,duration:.45,stagger:.05},'-=0.15');}
  function play(){roots.forEach(animateIn);}
  if(document.fonts&&document.fonts.ready){document.fonts.ready.then(play);}else{play();}
  setTimeout(()=>{if(getComputedStyle(roots[0].querySelector('.wcard')).opacity==='0')play();},500);
  document.getElementById('replay').addEventListener('click',play);
})();
</script>
</body>
</html>
